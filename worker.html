<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>
    WhatsApp Worker
  </title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<h2>
  WhatsApp Worker Running...
</h2>

<script>

  // =====================================================
  // FIREBASE CONFIG
  // =====================================================

  const firebaseConfig = {

    apiKey:
      "YOUR_API_KEY",

    authDomain:
      "YOUR_AUTH_DOMAIN",

    databaseURL:
      "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app",

    projectId:
      "YOUR_PROJECT_ID",

    storageBucket:
      "YOUR_BUCKET",

    messagingSenderId:
      "YOUR_SENDER_ID",

    appId:
      "YOUR_APP_ID"

  };

  firebase.initializeApp(firebaseConfig);

  const db =
    firebase.database();

  // =====================================================
  // START LISTENER
  // =====================================================

  console.log(
    "WhatsApp Worker Started..."
  );

  db.ref("whatsapp_queue")

    .orderByChild("status")

    .equalTo("PENDING")

    .on(

      "child_added",

      async function(snapshot) {

        const data =
          snapshot.val();

        const key =
          snapshot.key;

        console.log(
          "NEW QUEUE ITEM:",
          key,
          data
        );

        try {

          // =====================================================
          // SEND TO ASSISTRO
          // =====================================================

          const response =
            await fetch(

              "https://app.assistro.co/api/v1/wapushplus/single/message",

              {

                method:
                  "POST",

                headers: {

                  "Content-Type":
                    "application/json",

                  "Authorization":
                    "Bearer YOUR_ASSISTRO_API_KEY"

                },

                body:
                  JSON.stringify({

                    msgs: [

                      {

                        number:
                          "91" + data.mobile,

                        message:

                          "YOUR TICKET NUMBER = " +

                          data.ticket +

                          " AGAINST REGISTRATION FOR " +

                          data.eventTitle

                      }

                    ]

                  })

              }

            );

          const result =
            await response.text();

          console.log(
            "ASSISTRO RESPONSE:",
            result
          );

          // =====================================================
          // MARK AS SENT
          // =====================================================

          await db.ref(

            "whatsapp_queue/" + key

          ).update({

            status:
              "SENT",

            sent_at:
              Date.now(),

            response:
              result

          });

          console.log(
            "QUEUE ITEM SENT:",
            key
          );

        }

        catch(error) {

          console.error(
            "SEND FAILED:",
            error
          );

          // =====================================================
          // MARK FAILED
          // =====================================================

          await db.ref(

            "whatsapp_queue/" + key

          ).update({

            status:
              "FAILED",

            error:
              error.toString()

          });

        }

      }

    );

</script>

</body>
</html>
