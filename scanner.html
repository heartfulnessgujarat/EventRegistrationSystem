<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>MERS QR Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>



  
  <style>

    body {

      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #reader {

      width: 320px;
      margin: auto;
    }

    #result {

      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: green;
      word-break: break-all;
    }

  </style>

</head>

<body>

  <h2 id="eventTitle">
  Loading Event...
</h2>

  <div id="reader"></div>

  <div id="result">

    Waiting for QR scan...

  </div>

<script>

// =====================================================
// FETCH EVENT TITLE
// =====================================================


  const firebaseConfig = { databaseURL: "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };



  firebase.initializeApp(firebaseConfig);

const db =
 firebase.database();

  
const params =
    new URLSearchParams(
        window.location.search
    );

const eventId =
    params.get("event");




async function loadEventTitle() {

    if (!eventId) return;

    const snap =
        await db.ref(
            'config/eventConfig'
        ).once('value');

    if (!snap.exists()) return;

    const configs =
        snap.val();

    const eventConfig =
        Object.values(configs).find(

            cfg =>
            cfg.event_id === eventId

        );

    if (!eventConfig) return;

    document.getElementById(
        "eventTitle"
    ).innerText =

        eventConfig.event_title ||
        "Attendance Scanner";
}

  loadEventTitle();


  
</script>

</body>
</html>
