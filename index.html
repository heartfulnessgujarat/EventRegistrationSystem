<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MERS - Section Flow</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
    .card { width: 100%; max-width: 480px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; display: none; }
    .header-img { width: 100%; display: block; border-bottom: 2px solid #eee; }
    .content { padding: 25px; }
    h2, h3 { color: #1a237e; margin-top: 0; border-bottom: 2px solid #1a237e; padding-bottom: 8px; }
    .field-group { margin-bottom: 18px; text-align: left; position: relative; }
    label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; color: #333; }
    input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: border 0.3s; }
    input:focus { border-color: #1a237e; outline: none; box-shadow: 0 0 5px rgba(26,35,126,0.2); }
    .lookup-results { position: absolute; width: 100%; background: white; border: 1px solid #ddd; z-index: 1000; max-height: 200px; overflow-y: auto; border-radius: 0 0 8px 8px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .lookup-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
    .lookup-item:hover { background: #f0f2f5; }
    .btn-row { display: flex; gap: 12px; margin-top: 25px; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
    .btn-primary { background: #1a237e; color: white; }
    .btn-primary:hover { background: #0d1440; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; justify-content:center; align-items:center; z-index:9999; }
  </style>
</head>
<body>

<div id="loader"><strong>Initializing MERS Engine...</strong></div>

<div id="screen-section1" class="card"><div class="header-box"></div><div class="content"><h2 id="title-1">Section 1</h2><div id="fields-section1"></div><div class="btn-row"><button class="btn btn-primary" onclick="navigateTo('Section2')">Next Page →</button></div></div></div>
<div id="screen-section2" class="card"><div class="header-box"></div><div class="content"><h3>Logistics</h3><div id="fields-section2"></div><div class="btn-row"><button class="btn btn-secondary" onclick="navigateTo('Section1')">← Back</button><button class="btn btn-primary" onclick="navigateTo('Section3')">Next Page →</button></div></div></div>
<div id="screen-section3" class="card"><div class="header-box"></div><div class="content"><h3>Final Details</h3><div id="fields-section3"></div><div class="btn-row"><button class="btn btn-secondary" onclick="navigateTo('Section2')">← Back</button><button class="btn btn-primary" onclick="finalSubmit()">Register Now</button></div></div></div>

<script>
const firebaseConfig = { databaseURL: "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let eventId = new URLSearchParams(window.location.search).get('id') || "EVT001";
let masterData = [], fieldRules = [], eventConfig = {};

async function init() {
    try {
        const [c, r, m] = await Promise.all([
            db.ref(`events/${eventId}/config`).once('value'),
            db.ref(`events/${eventId}/rules`).once('value'),
            db.ref(`masters/Master_Internal_DB`).once('value')
        ]);
        eventConfig = c.val() || {};
        fieldRules = r.val() || [];
        const rawM = m.val();
        masterData = Array.isArray(rawM) ? rawM : Object.values(rawM || {});

        renderStatic();
        buildSection('Section1', 'fields-section1');
        buildSection('Section2', 'fields-section2');
        buildSection('Section3', 'fields-section3');

        document.getElementById('loader').style.display = 'none';
        navigateTo('Section1');
    } catch (e) { alert("Data Sync Error. Check Console."); }
}

function renderStatic() {
    document.getElementById('title-1').innerText = eventConfig.event_name || "Registration";
    const imgHtml = eventConfig.header_image_url ? `<img src="${eventConfig.header_image_url}" class="header-img">` : "";
    document.querySelectorAll('.header-box').forEach(box => box.innerHTML = imgHtml);
}

function buildSection(sectionName, containerId) {
    const container = document.getElementById(containerId);
    // CRITICAL FIX: Case-insensitive match for "Section1" vs "section1"
    const rules = fieldRules.filter(r => String(r.section_number).trim().toLowerCase() === sectionName.toLowerCase());
    
    container.innerHTML = rules.map(r => `
        <div class="field-group">
            <label>${r.display_label || r.field_id}</label>
            <input type="text" id="inp-${r.field_id}" placeholder="${r.field_help_text || ''}"
                   onclick="handleLookup('${r.field_id}', this.value, '${r.lookup_tab||''}', '${r.lookup_column||''}')"
                   oninput="handleLookup('${r.field_id}', this.value, '${r.lookup_tab||''}', '${r.lookup_column||''}')">
            <div id="res-${r.field_id}" class="lookup-results"></div>
        </div>
    `).join('');
}

function navigateTo(id) {
    document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
    const target = document.getElementById(`screen-${id.toLowerCase()}`);
    if (target) { target.style.display = 'block'; window.scrollTo(0,0); }
}

async function handleLookup(fid, val, tab, col) {
    const res = document.getElementById(`res-${fid}`);
    if (fid === 'full_name') {
        const matches = masterData.filter(m => m.full_name?.toLowerCase().includes(val.toLowerCase())).slice(0,5);
        displayMatches(fid, matches, 'full_name', res);
        return;
    }
    if (tab) {
        const snap = await db.ref(`masters/${tab}`).once('value');
        const list = Object.values(snap.val() || {});
        const searchCol = col || fid;
        const matches = list.filter(i => !val || String(i[searchCol]).toLowerCase().includes(val.toLowerCase())).slice(0,10);
        displayMatches(fid, matches, searchCol, res);
    }
}

function displayMatches(fid, list, col, div) {
    if (list.length > 0) {
        div.innerHTML = list.map(m => `<div class="lookup-item" onclick="setVal('${fid}','${m[col]}')">${m[col]}</div>`).join('');
        div.style.display = 'block';
    } else { div.style.display = 'none'; }
}

function setVal(fid, val) {
    document.getElementById(`inp-${fid}`).value = val;
    document.getElementById(`res-${fid}`).style.display = 'none';
}

function finalSubmit() { alert("Registration Complete!"); }

init();
</script>
</body>
</html>
