<script>

function formatFirebaseDate(fbDate) {
    if (!fbDate) return "";
    try {
        // This handles "1-Mar-2026" by splitting at the dashes
        const parts = fbDate.split('-');
        if (parts.length !== 3) return "";
        
        const day = parts[0].padStart(2, '0');
        const monthStr = parts[1];
        const year = parts[2];
        
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const monthIndex = months.indexOf(monthStr);
        if (monthIndex === -1) return "";
        
        const month = String(monthIndex + 1).padStart(2, '0');
        return `${year}-${month}-${day}`;
    } catch (e) {
        console.error("Date Translation Error:", e);
        return "";
    }
}


  let verificationAttempts = { email: 0, mobile: 0 };
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDlkvfWJGTJC36MkEEfRyTCDdMjj0s1z-GcSS3deMdfrDlyN96Qml6OuSO6cfFPQcyEQ/exec";


                   // https://script.google.com/macros/s/AKfycbzDlkvfWJGTJC36MkEEfRyTCDdMjj0s1z-GcSS3deMdfrDlyN96Qml6OuSO6cfFPQcyEQ/exec

  const firebaseConfig = { databaseURL: "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
  
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const eventId = (new URLSearchParams(window.location.search).get('id') || 'EVT001').toUpperCase();
  
  let mersTempData = {};

  
  let fieldRules = [], masterData = [], eventConfig = {}, moreSections = [];

let profileSnapshotForScript = ""; // <--- ADD THIS LINE
  
  let originalData = {}; 
  let verificationStates = { email: false, mobile: false };

/** --- START: GATEKEEPER HELPER FUNCTIONS --- **/
function getISTDate() {
  const now = new Date();
  const istOffset = 5.5 * 60 * 60 * 1000;
  const istTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + istOffset);
  istTime.setHours(0, 0, 0, 0); 
  return istTime;
}

function parseCustomDate(dateStr) {
  if (!dateStr || typeof dateStr !== 'string' || dateStr.trim() === "") return null;
  const months = {
    "Jan": 0, "Feb": 1, "Mar": 2, "Apr": 3, "May": 4, "Jun": 5,
    "Jul": 6, "Aug": 7, "Sep": 8, "Oct": 9, "Nov": 10, "Dec": 11
  };
  const parts = dateStr.split('-');
  if (parts.length !== 3) return null;
  const day = parseInt(parts[0], 10);
  const month = months[parts[1]];
  const year = parseInt(parts[2], 10);
  if (isNaN(day) || month === undefined || isNaN(year)) return null;
  return new Date(year, month, day);
}

function blockUIWithNotice(message) {
  document.body.innerHTML = `
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; font-family: sans-serif;">
      <div style="text-align: center; padding: 40px; border-radius: 12px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 90%;">
        <div style="font-size: 50px; margin-bottom: 20px;">🗓️</div>
        <h2 style="color: #333; margin-bottom: 15px;">Registration Notice</h2>
        <p style="font-size: 18px; color: #555; line-height: 1.5;">${message}</p>
      </div>
    </div>`;
  throw new Error("Registration Locked: " + message);
}
/** --- END: GATEKEEPER HELPER FUNCTIONS --- **/



  
  async function init() {

console.log("%c MERS PING 1: Init sequence started. CurrentSection is: " + (typeof currentSection !== 'undefined' ? currentSection : 'UNDEFINED'), "color: orange;");

    
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const mode = (urlParams.get('mode') || 'new').toLowerCase();
        const regId = urlParams.get('regId');

        // 1. Fetch Config from Firebase
        const configSnap = await db.ref('config/eventConfig').once('value');
        const allConfigs = configSnap.val() || {};
        eventConfig = allConfigs[eventId];
        
        if (!eventConfig) {
            document.getElementById('loading-init').innerHTML = "<h2>Event Not Found</h2>";
            return;
        }

        // 2. DATE CHECK (Gatekeeper Tier 1)
        const today = getISTDate();
        const startDate = parseCustomDate(eventConfig.reg_start_date);
        const endDate = parseCustomDate(eventConfig.reg_end_date);

        if (startDate && endDate) {
            if (today < startDate || today > endDate) {
                blockUIWithNotice(eventConfig.reg_close_msg || "Registration is currently closed.");
                return; 
            }
        }

        // 3. CAPACITY CHECK (Gatekeeper Tier 2)
        if (mode === 'new') {
            const counterSnap = await db.ref('counters/' + eventId).once('value');
            const currentCount = Number(counterSnap.val() || 0); 
            const maxCapacity = Number(eventConfig.hall_capacity || 0);

            if (maxCapacity > 0 && currentCount >= maxCapacity) {
                blockUIWithNotice(eventConfig.hall_capacity_full_msg || "Hall Capacity is full.");
                return; 
            }
        }

        // 4. LOAD UI COMPONENTS
        const [thankSnap, bannerSnap] = await Promise.all([
            db.ref('htmlStorage/' + eventId + '/thank').once('value'),
            db.ref('htmlStorage/' + eventId + '/banner').once('value')
        ]);

        eventConfig.final_html = thankSnap.val() || "<h2>Registration Successful!</h2>";
        const bannerHtml = bannerSnap.val(); 

        document.getElementById('title').innerHTML = eventConfig.title || "Registration";

        const container = document.getElementById('header-img-cont');
        if (bannerHtml && container) {
            container.innerHTML = bannerHtml;
            container.style.display = 'block';
        } else if (container) {
            container.style.display = 'none';
        }
      
        document.getElementById('subtitle').innerHTML = eventConfig.subtitle || "";
        
        // --- MERS: DATA BRIDGE ---
        
        // 1. Load Field Rules (Filtering for this specific Event ID)
        try {
            const rulesSnap = await db.ref('config/fieldRules').once('value');
            const allRules = rulesSnap.val() || {};
            fieldRules = Object.values(allRules).filter(r => String(r.event_id).toUpperCase() === eventId);
            console.log("MERS: Field Rules Loaded:", fieldRules.length);
        } catch (ruleErr) {
            console.error("MERS: Field Rules fetch error:", ruleErr);
            fieldRules = [];
        }

        // 2. Load More Sections (Correcting path to camelCase 'moreSections')
        try {
            const sectionsSnap = await db.ref('config/moreSections').once('value');
            if (sectionsSnap.exists()) {
                const allSections = sectionsSnap.val() || {};
                moreSections = Object.values(allSections);
                console.log("MERS: moreSections Loaded from Firebase:", moreSections.length);
            } else {
                console.warn("MERS: No data found at 'config/moreSections'.");
                moreSections = [];
            }
        } catch (secErr) {
            console.error("MERS: moreSections fetch error:", secErr);
            moreSections = [];
        }

        // --- END MERS DATA BRIDGE ---
        
        // --- ROUTING LOGIC ---
        if (mode === 'edit' || mode === 'delete') {
            if (regId) {
                loadExistingData(regId, mode); 
            } else {
                alert("Invalid Link: Registration ID missing.");
                location.href = window.location.pathname + "?id=" + eventId;
            }
        } else {
            // Normal New Registration
            renderForm();
            document.getElementById('loading-init').style.display = 'none';
            document.getElementById('form-content').style.display = 'block';
        }
        
    } catch (e) { 
        console.error("Initialization Error:", e);
        document.getElementById('loading-init').innerHTML = "<h2>Error loading form. Please refresh.</h2>";
    }

  //  if (section2) {
   //     section2.prepend(diag);
  //  }
    
}

  
  function renderForm() {
  const container = document.getElementById('dynamic-fields');
  container.innerHTML = '';
  
  fieldRules.forEach(r => {
    
    // --- MERS SURGERY START: Bulletproof Section Filter ---
    // 1. Convert the section value to a clean string
    const secValue = r.section_number ? String(r.section_number).trim() : "";
    
    // 2. LOGIC: If a field is NOT explicitly Section1, skip it.
    // This will catch "Section2", "Section3", and even blank values.
    if (secValue !== "Section1") {
      return; 
    }
    // --- MERS SURGERY END ---

    const div = document.createElement('div');
    div.className = 'field-container';
    div.id = `cont-${r.field_id}`;
    div.style.display = (r.initial_state === 'Hidden') ? 'none' : 'block';
    const needsEditLink = ['Editable', 'Editable_Verify', 'Editable_Lookup'].includes(r.edit_behavior);
    
    div.innerHTML = `
      <div class="label-row">
        <label>${r.display_label || r.field_id}</label>
        ${needsEditLink ? `<span class="edit-link" id="edit-link-${r.field_id}" style="display:none;" onclick="unlockField('${r.field_id}')">Edit</span>` : ''}
      </div>
      <input type="text" id="inp-${r.field_id}" oninput="onInputChange('${r.field_id}', this.value)" disabled autocomplete="off">
      <div class="help-text" id="help-${r.field_id}">${r.field_help_text || ''}</div>
      <div class="error-msg-text" id="err-${r.field_id}"></div>
      <div class="dropdown" id="res-${r.field_id}"></div>
      <div id="vmsg-${r.field_id}" style="font-size:13px; margin-top:5px; font-weight:bold; display:none;"></div>
      ${(r.field_id === 'email' || r.field_id === 'mobile') ? `
        <div class="verify-panel" id="panel-${r.field_id}">
          
          ${r.field_id === 'email' ? `
            <button type="button" class="verify-btn" id="vcheck-email" 
              style="background:#455a64; color:white; margin-bottom:10px;" 
              onclick="manualFormatCheck()">Check Email Format</button>
          ` : ''}

          <button class="verify-btn" id="vbtn-${r.field_id}" 
            style="display: ${r.field_id === 'email' ? 'none' : 'block'};" 
            onclick="sendCode('${r.field_id}')"></button>
          
          <div id="box-${r.field_id}" style="display:none;">
            <input type="text" placeholder="Enter 6-digit code" id="code-${r.field_id}" oninput="verifyCodeInput('${r.field_id}', this.value)">
            <div id="resend-container-${r.field_id}" style="margin-top:8px;"></div>
          </div>
        </div>
      ` : ''}
    `;
    container.appendChild(div);
    if (r.field_id === 'full_name') {
      div.style.display = 'block';
      document.getElementById('inp-full_name').disabled = false;
    }
  });
}


 
  async function onInputChange(fId, val) {
  if (fId === 'full_name' || fId === 'centre') handleSearch(fId, val);
  checkAllValidations();
}



  
function renderDropdown(div, list, type) {
  div.innerHTML = '';
  
  if (list.length > 0) {
    div.style.display = 'block';
    
    list.forEach(item => {
      const d = document.createElement('div');
      d.className = 'item'; 
      
      // 1. SURGICAL FIX: Display the correct text based on type
      // If it's a 'loc' object, show the 'centre' property.
      // If it's a name string, show the string.
      const displayValue = (type === 'loc') ? (item.centre || item) : item;
      d.textContent = displayValue; 
      
      d.onclick = () => {
        if (type === 'loc') {
          // 2. THE CHAIN REACTION: 
          // We already have the full object (item) from handleSearch!
          // No need to search masterData again. Just pass it directly.
          selectLocation(item); 
          
        } else {
          // This remains the same for the initial Name search
          const person = masterData.find(x => {
            const name = x.full_name || x['Full Name'] || "";
            return String(name).trim() === item;
          });
          if (person) {
            selectParticipant(person); 
          }
        }
        div.style.display = 'none';
      };
      div.appendChild(d);
    });
  } else { 
    div.style.display = 'none'; 
  }
}


async function handleSearch(fId, val) {
  const resDiv = document.getElementById(`res-${fId}`);
  if (val.length < 3) { resDiv.style.display = 'none'; return; }
  
  const rule = fieldRules.find(r => r.field_id === fId);
  const lookupTab = rule ? rule.lookup_tab : "Master_Internal_DB"; // Fallback to Master if rule is loading

  /** * THE "SCENARIO B" FIX: 
   * During an Email Edit, masterData.length is exactly 1 (the user's record).
   * We force a fetch if we are searching a lookup field like 'centre'
   * to ensure the system "wakes up" and sees the whole database.
   */
  if (lookupTab && (masterData.length <= 1 || fId === 'centre')) { 

// OLD LINE: const snap = await db.ref(lookupTab).once('value');
// NEW SURGICAL UPDATE:
const snap = await db.ref('masters/' + lookupTab).once('value');
    
    
    
    const raw = snap.val() || {};
    masterData = Array.isArray(raw) ? raw : Object.values(raw);
  }

  const searchVal = val.toLowerCase();

  // --- FULL NAME SEARCH LOGIC ---
  if (fId === 'full_name') {
    const allMatches = masterData
      .filter(x => {
        const n = x.full_name || x['Full Name'] || "";
        return String(n).toLowerCase().includes(searchVal);
      })
      .map(x => String(x.full_name || x['Full Name'] || "").trim());

    const uniqueNames = [...new Set(allMatches)];
    renderDropdown(resDiv, uniqueNames.slice(0, 8), 'name');

  // --- CENTRE SEARCH LOGIC ---
  } else if (fId === 'centre') {
    const matchedObjects = masterData.filter(x => {
      // Direct property access as per your verified column titles
      const c = x.centre || x['Centre'] || ""; 
      return String(c).toLowerCase().includes(searchVal);
    });

    // UNIQUE: Ensure cities like "Navsari" only appear once in the dropdown
    const uniqueMap = new Map();
    matchedObjects.forEach(item => {
      const cityName = String(item.centre || item['Centre'] || "").trim();
      if (cityName && !uniqueMap.has(cityName.toLowerCase())) {
        uniqueMap.set(cityName.toLowerCase(), item);
      }
    });

    const finalUniqueList = Array.from(uniqueMap.values());
    renderDropdown(resDiv, finalUniqueList.slice(0, 8), 'loc');
  }
}



  function selectParticipant(p) {
    fieldRules.forEach(r => {
      const el = document.getElementById(`inp-${r.field_id}`);
      const cont = document.getElementById(`cont-${r.field_id}`);
      const editLink = document.getElementById(`edit-link-${r.field_id}`);
      if (el) {
        const masterValue = p[r.field_id] || p[r.field_id.replace('_',' ')] || "";
        el.value = masterValue;
        originalData[r.field_id] = masterValue;
        cont.style.display = (r.initial_state === 'Hidden') ? 'none' : 'block';
        el.disabled = true;
        if (editLink) editLink.style.display = 'none';
      }
    });
    document.getElementById('res-full_name').style.display = 'none';
    document.getElementById('btns-start').style.display = 'flex';
    document.getElementById('inp-full_name').disabled = true;
    checkAllValidations();
  }


function selectLocation(l) {
  if (!l) return;

  // 1. Update the Centre field itself
  const centreInp = document.getElementById('inp-centre');
  if (centreInp) {
    centreInp.value = l.centre || l.Centre || "";
  }

  // 2. DYNAMIC VLOOKUP: Look at Field_Rules instead of a hard-coded list
  // We find all fields that are set to 'Locked' and have a lookup_tab
  const dependentFields = fieldRules.filter(r => r.edit_behavior === 'Locked');

  dependentFields.forEach(rule => {
    const fId = rule.field_id;
    const el = document.getElementById(`inp-${fId}`);
    
    if (el) {
      // Get the value from the Master Database object (l) 
      // using the field_id as the key (e.g., l['state'])
      const newValue = l[fId] || l[fId.charAt(0).toUpperCase() + fId.slice(1)] || '';
      el.value = newValue;
    }

  function sendCode(type) {
    verificationAttempts[type] = 0;

    if (msg) msg.style.display = "none";
    const targetEmail = (type === 'email') ? document.getElementById('inp-email').value : originalData['email'];

  function startResendTimer(type) {

      else { clearInterval(interval); container.innerHTML = `<span class="resend-link" onclick="resendCode('${type}')">Resend Code</span>`; }
    }, 1000);

  async function verifyCodeInput(type, code) {
    if (code.length === 6) {
      const emailKey = ((type === 'email') ? document.getElementById('inp-email').value : originalData['email']).replace(/[.#$[\]]/g, "_");
      const snap = await db.ref("verificationCodes/" + emailKey).once('value');
      const data = snap.val();
      const msg = document.getElementById(`vmsg-${type}`);
      const panel = document.getElementById(`panel-${type}`);
      const codeInp = document.getElementById(`code-${type}`);
      if (data && data.code === code && (new Date().getTime() - data.timestamp < 300000)) {
        msg.innerText = "Verified ✅"; msg.style.color = "#2e7d32"; msg.style.display = "block";
        if (panel) panel.style.display = "none";
        document.getElementById(`inp-${type}`).disabled = true;
        verificationStates[type] = true;
        verificationAttempts[type] = 0;
        checkAllValidations();
      } else {
        verificationAttempts[type]++;
        if (verificationAttempts[type] >= 3) {
          msg.innerText = "Too many failed attempts."; msg.style.color = "#d32f2f"; msg.style.display = "block";
          codeInp.disabled = true; codeInp.value = "LOCKED";
        } else {
          msg.innerText = `Invalid Code. Attempt ${verificationAttempts[type]} of 3.`;
          msg.style.color = "#d32f2f"; msg.style.display = "block";
          setTimeout(() => { codeInp.value = ""; codeInp.focus(); }, 1000);
        }
        verificationStates[type] = false;
      }
    }
  }



function checkAllValidations() {
    let allValid = true;
    fieldRules.forEach(r => {
      const input = document.getElementById(`inp-${r.field_id}`);
      const errDiv = document.getElementById(`err-${r.field_id}`);
      if (input) {
        let isValid = validateField(r.field_id, input.value, r.field_validation);
        let isChanged = input.value !== (originalData[r.field_id] || "");
        
        if (!isValid && input.value.trim() !== "") {
          input.style.border = '2px solid red';
          if (errDiv) { errDiv.innerText = r.error_msg || "Invalid input"; errDiv.style.display = 'block'; }
          allValid = false;
        } else {
          input.style.border = '1px solid #ced4da';
          if (errDiv) errDiv.style.display = 'none';
        }

        if (r.field_id === 'email' || r.field_id === 'mobile') {
          const panel = document.getElementById(`panel-${r.field_id}`);
          const vBtn = document.getElementById(`vbtn-${r.field_id}`);
          const msg = document.getElementById(`vmsg-${r.field_id}`);

          if (verificationStates[r.field_id]) {
            if (msg) msg.style.display = 'block'; 
            if (panel) panel.style.display = 'none';
          } 
          else if (isValid && isChanged) {
            vBtn.innerText = `Click here to send Verification Code to ${input.value}`;
            panel.style.display = 'block';
            if (msg) msg.style.display = 'none';
            allValid = false;
          } 
          else {
            if (panel) panel.style.display = 'none';
            if (!isChanged && msg) msg.style.display = 'none';
          }
        }
        
        if (input.value.trim() === "" && r.initial_state === 'Visible') allValid = false;
      }
    });

    const masterBtn = document.getElementById('btn-master-update');
    const regBtn = document.getElementById('btn-register');
    if (masterBtn) masterBtn.disabled = !allValid;
    if (regBtn) regBtn.disabled = !allValid;
  }

      msg.style.color = "#2e7d32";
      msg.style.display = "block";
    }
  } else {
    let errorNote = "Please check for typos or extra characters.";
    if (!emailVal.includes("@")) errorNote = "Missing '@' symbol.";
    else if (!emailVal.includes(".")) errorNote = "Missing a dot (e.g., .com).";
    else if (/\s/.test(emailVal)) errorNote = "Spaces are not allowed within the email.";

    emailInput.style.border = '2px solid red';
    emailInput.focus();
  }

async function loadExistingData(regId, mode) {
    try {
        // 1. IMMEDIATE UI CLEANUP: Stop the spinner for all background-check scenarios
        const hideLoading = () => {
            const loader = document.getElementById('loading-init');
            if (loader) loader.style.display = 'none';
        };

        // 2. PARALLEL FETCH: Get everything at once for speed
        const [delSnap, masterSnap, regSnap] = await Promise.all([
            db.ref('deleted_registrations/' + regId).once('value'),
            db.ref('masters/Master_Internal_DB/' + regId).once('value'),
            db.ref('registrations/' + regId).once('value')
        ]);

        const deletedData = delSnap.val();
        let activeData = masterSnap.val() || regSnap.val();

        // --- PATH A: THE ARCHIVE (Transparency) ---
        // We check this first. If it's deleted, we show the message and STOP.
        if (deletedData) {
            hideLoading();
            const mainContainer = document.getElementById('form-content');
            mainContainer.style.display = 'block';
            mainContainer.innerHTML = `
                <div style="max-width: 800px; margin: 50px auto; padding: 40px; text-align: center; border: 1px solid #d9d9d9; border-radius: 15px; font-family: sans-serif; background: #fafafa;">

                    <p>Our records show this registration was <span style="color: #cf1322; font-weight: bold;">Deleted</span> on:</p>
                    <div style="background: #fff; border: 1px dashed #cf1322; padding: 15px; display: inline-block; border-radius: 8px; margin: 15px 0; font-family: monospace; color: #cf1322;">
                        ${deletedData.deleted_at}
                    </div>
                    <p style="color: #8c8c8c;">This link is no longer active.</p>
                </div>`;
            return; // EXIT: Code below will never run
        }


// --- PATH B: ACTIVE DELETE MODE ---
        // This block is isolated for the Delete feature only
        if (mode === 'delete' && activeData) {
            
            // 1. CLEAR THE STAGE: Hide the loading spinner directly
            const loader = document.getElementById('loading-init');
            if (loader) loader.style.display = 'none';
            
            // 2. SHOW THE LIGHTS: Make the main content area visible
            const formContainer = document.getElementById('form-content');
            if (formContainer) formContainer.style.display = 'block'; 
            
            // 3. TRIGGER DELETE UI: Run your established delete interface
            renderDeleteInterface(regId, activeData); 
            
            // 4. STOP: Exit immediately so Edit logic is never touched
            return; 
        }




        // --- PATH C: EDIT MODE (The Integrity Path) ---
        // This only runs if Path A and Path B were skipped.
        if (mode === 'edit' && activeData) {
            originalData = activeData;
            profileSnapshotForScript = encodeURIComponent(JSON.stringify(activeData));
            
            // Now we allow the form to render because it is actually needed
            renderForm(); 

            // Fill all previous answers from all sections
            fieldRules.forEach(r => {
                const el = document.getElementById(`inp-${r.field_id}`);
                if (el && activeData[r.field_id] !== undefined) {
                    el.value = activeData[r.field_id];
                    if (['full_name', 'mobile', 'email'].includes(r.field_id)) {
                        el.disabled = true;
                        el.style.background = "#f5f5f5";
                    }
                }
            });

            hideLoading();
            document.getElementById('form-content').style.display = 'block';

            // Show the "Ideal Screen" buttons (Screenshot _3)

            }

            const regBtn = document.getElementById('btn-register');
            if (regBtn) {
                regBtn.disabled = false;
                regBtn.style.background = "#1a237e";
                regBtn.innerText = "DETAILS ARE OKAY, CLICK HERE TO PROCEED FURTHER";
            }
            
            if(typeof updateButtonState === 'function') updateButtonState();
            return;
        }

        // FALLBACK: If record not found at all
        hideLoading();
        document.getElementById('form-content').style.display = 'block';
        document.getElementById('form-content').innerHTML = `<div style="text-align:center; padding:100px;"><h2>Registration Not Found</h2></div>`;

        const counterRef = db.ref('counters/' + eventId);
        await counterRef.transaction((current) => {

        await db.ref('registrations/' + regId).update({

            options.forEach(opt => {

                input.appendChild(o);
            });

        }

        input.id = `extra_${fieldId}`;
        input.className = "mers-input";

        // --- THE CRITICAL MEMORY CHECK ---

        if (typeof originalData !== 'undefined' && originalData && originalData[fieldId] !== undefined) {
            input.value = originalData[fieldId];

    if(typeof updateButtonState === 'function') updateButtonState();

async function buildExtraSections(targetSectionNumber) {
    if (!targetSectionNumber) targetSectionNumber = "Section2";

    const container = document.getElementById('dynamic-sections-content');
    const titleHeader = document.getElementById('title-Section2');
    const actionBtn = document.getElementById('btn-next-action'); 
    const backBtn = document.getElementById('btn-back-to-profile');

    // --- 1. SYNC CURRENT SECTION INPUTS BEFORE REDRAWING ---
    const currentInputs = document.querySelectorAll('[id^="extra_"]');
    currentInputs.forEach(input => { 
        const cleanId = input.id.replace('extra_', '');
        mersTempData[cleanId] = input.value; 
        mersTempData[input.id] = input.value;
        if (originalData) originalData[cleanId] = input.value; // Sync to originalData too
    });

    container.innerHTML = ""; 
    actionBtn.disabled = true;

    const sectionObj = moreSections.find(s => s.section_number === targetSectionNumber);
    
    if (sectionObj) {
        titleHeader.innerText = sectionObj.section_name || "Details";

        const systemKeys = ['section_name', 'section_number', 'section_id', 'id'];
        const fieldKeys = Object.keys(sectionObj).filter(key => 
            !systemKeys.includes(key) && sectionObj[key] && typeof sectionObj[key] === 'string'
        ).sort((a, b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
        
        for (const key of fieldKeys) {
            const fieldId = sectionObj[key];
            const rule = fieldRules.find(r => r.field_id === fieldId);
            
            if (rule) {
                const fieldWrapper = document.createElement('div');
                fieldWrapper.className = 'form-group';
                fieldWrapper.id = `wrapper_extra_${fieldId}`; 
                fieldWrapper.style.marginBottom = "20px";
                fieldWrapper.style.textAlign = "left";

                const inputId = `extra_${fieldId}`;
                let valToSet = "";
                
                if (originalData && (originalData[fieldId] !== undefined || originalData[inputId] !== undefined)) {
                    valToSet = originalData[fieldId] || originalData[inputId];
                } else {
                    valToSet = mersTempData[inputId] || "";
                }

                if (valToSet && valToSet !== "") {
                    fieldWrapper.style.display = 'block';
                } else {
                    fieldWrapper.style.display = (rule.initial_state === "Hidden") ? 'none' : 'block';
                }

                const isMandatory = (rule.field_validation && rule.field_validation !== "NULL" && rule.field_validation !== "N/A");
                const label = document.createElement('label');
                label.innerHTML = `<strong>${rule.display_label || fieldId} ${isMandatory ? '<span style="color:red">*</span>' : ''}</strong>`;
                fieldWrapper.appendChild(label);

                let input;
                if (rule.edit_behavior === 'Editable_lookup_Dropdown') {
                    input = document.createElement('select');
                    input.className = 'form-control';
                    input.id = inputId;
                    const placeholder = document.createElement('option');
                    placeholder.text = "-- Select --"; placeholder.value = "";
                    input.appendChild(placeholder);

                    if (rule.lookup_tab && rule.lookup_column) {
                        try {
                            const lookupSnap = await db.ref(`masters/${rule.lookup_tab}`).once('value');
                            const lookupData = lookupSnap.val();
                            if (lookupData) {
                                const choices = Object.values(lookupData).map(row => row[rule.lookup_column]).filter(v => v);
                                [...new Set(choices)].forEach(choice => {
                                    const opt = document.createElement('option');
                                    opt.value = choice; opt.text = choice;
                                    input.appendChild(opt);
                                });
                            }
                        } catch (e) { console.error("Lookup Error", e); }
                    }
                } else {
                    input = document.createElement('input');
                    const fieldLower = fieldId.toLowerCase();
                    input.type = fieldLower.includes('date') ? 'date' : (fieldLower.includes('time') ? 'time' : 'text');
                    input.className = 'form-control';
                    input.id = inputId;
                }

                input.value = valToSet;
                input.dataset.mandatory = isMandatory;                  
                
                input.onchange = function() {
                    if (typeof validateField === 'function') {
                        if (validateField(this.id.replace('extra_', ''), this.value, rule.field_validation) === false) return;
                    }
                    handleFieldChange(this, rule);
                };

                input.oninput = function() { updateButtonState(); };

                fieldWrapper.appendChild(input);
                container.appendChild(fieldWrapper);
            }
        }

        actionBtn.onclick = function() {
            // THE "FINAL SYNC" LOCK
            const finalInputs = document.querySelectorAll('[id^="extra_"]');
            finalInputs.forEach(input => { 
                const cleanId = input.id.replace('extra_', '');
                mersTempData[cleanId] = input.value; 
                mersTempData[input.id] = input.value;
                if (originalData) originalData[cleanId] = input.value;
            });

            if (targetSectionNumber === "Section2") {
                buildExtraSections('Section3');
            } else {
                console.log("MERS: Finalizing Submission with updated values...");
                submitData(); // This triggers your existing thank you/email logic
            }
        };

        if (backBtn) {
            backBtn.onclick = (targetSectionNumber === "Section3") 
                ? () => buildExtraSections('Section2') 
                : () => { 
                    document.getElementById('Section2').style.display = 'none';  
                    document.getElementById('Section1').style.display = 'block';  
                };
        }

        actionBtn.innerText = (targetSectionNumber === "Section2") ? "PROCEED TO TRAVEL DETAILS" : "CONFIRM & REGISTER";
        setTimeout(() => { updateButtonState(); }, 800);
    }
}

  







  

  
async function handleFieldChange(inputElement, rule) {
    const val = inputElement.value;
    const fId = rule.field_id;
    const section = rule.section_number; 

    updateButtonState(); 
    if (!val) return;

    try {
        // Run the validation
        validateField(fId, val, rule.field_validation);
    } catch (err) {
        // If it fails (Section 3), alert and stop
        alert("❌ " + err);
        inputElement.value = ""; 
        updateButtonState();
        return; 
    }

    // --- WATERFALL (Section 3 One-by-One) ---
    // This finds the next question in the current section and reveals it
    const currentSectionQuestions = fieldRules.filter(r => r.section_number === section);
    const currentIndex = currentSectionQuestions.findIndex(r => r.field_id === fId);
    const nextRule = currentSectionQuestions[currentIndex + 1];

    if (nextRule) {
        const nextWrapper = document.getElementById(`wrapper_extra_${nextRule.field_id}`);
        if (nextWrapper) {
            nextWrapper.style.display = 'block';
            nextWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    // --- SECTION 1 & 2 SPECIAL BEHAVIOR ---
    if (rule.edit_behavior === 'Editable_Verify') {
        // This keeps your Mobile/Email verification working as before
        if (typeof handleVerification === "function") {
            handleVerification(fId, val);
        }
    }

    updateButtonState();
}

function updateButtonState() {
    console.log("%c MERS DIAG: updateButtonState triggered ", "background: #222; color: #bada55");
    const actionBtn = document.getElementById('btn-next-action');
    if (!actionBtn) return;

    const allInputs = document.querySelectorAll('input, select, textarea');
    const rulesArray = Array.isArray(fieldRules) ? fieldRules : Object.values(fieldRules);
    
    let dynamicSectionName = "";
    let totalVisibleRequired = 0;
    let totalFilled = 0;
    let diagData = [];

    // 1. Identify the current section using the "Hybrid Bridge"
    for (let input of allInputs) {
        const group = input.closest('.form-group') || input.closest('.input-group');
        const isVisible = group && group.style.display !== 'none';
        
        if (isVisible) {
            // BRIDGE: Remove 'extra_' or 'inp-' just to find the rule match
            const cleanId = input.id.replace('extra_', '').replace('inp-', '');
            const rule = rulesArray.find(r => r.field_id === cleanId);
            
            if (rule) {
                // Once we find one rule, we know which section we are validating
                if (!dynamicSectionName) dynamicSectionName = rule.section_number;
                
                // Only validate fields for the ACTIVE section
                if (rule.section_number === dynamicSectionName) {
                    totalVisibleRequired++;
                    const val = input.value.trim();
                    if (val !== "" && val !== "-- Select --") {
                        totalFilled++;
                    }
                    diagData.push({ 
                        ID: input.id, 
                        RuleMatch: rule.field_id, 
                        Value: val 
                    });
                }
            }
        }
    }

    // 2. Log the "X-RAY" for debugging
    if (diagData.length > 0) {
        console.log(`--- MERS X-RAY: [${dynamicSectionName}] ---`);
        console.table(diagData);
    }

    // 3. Button Text Update
    const currentNum = window.currentSection || 1;
    if (dynamicSectionName === "Section3" || currentNum === 3) {
        actionBtn.innerText = "CONFIRM & REGISTER";
    } else if (dynamicSectionName === "Section2" || currentNum === 2) {
        actionBtn.innerText = "PROCEED TO TRAVEL DETAILS";
    } else {
        actionBtn.innerText = "PROCEED TO SELECTION";
    }

    // 4. THE UNLOCK LOGIC
    // If we are in a section with dynamic rules (Sect 2 or 3)
    if (totalVisibleRequired > 0) {
        if (totalFilled === totalVisibleRequired) {
            actionBtn.disabled = false;
            actionBtn.style.opacity = "1";
            actionBtn.style.cursor = "pointer";
        } else {
            actionBtn.disabled = true;
            actionBtn.style.opacity = "0.5";
            actionBtn.style.cursor = "not-allowed";
        }
    } else {
        // Fallback for Section 1 (Profile)
        if (currentNum === 1) {
            actionBtn.disabled = false;
            actionBtn.style.opacity = "1";
        } else {
            // Safety lock if we are lost between sections
            actionBtn.disabled = true;
            actionBtn.style.opacity = "0.5";
        }
    }
}

  function translateToISO(val) {
    if (!val) return "";
    const str = String(val).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
    if (str.includes('-')) {
        const parts = str.split('-');
        if (parts.length === 3) {
            const day = parts[0].padStart(2, '0');
            const monthStr = parts[1].toLowerCase().substring(0, 3);
            const year = parts[2].length === 2 ? "20" + parts[2] : parts[2];
            const monthsMap = {
                jan: '01', feb: '02', mar: '03', apr: '04', may: '05', jun: '06',
                jul: '07', aug: '08', sep: '09', oct: '10', nov: '11', dec: '12'
            };
            const month = monthsMap[monthStr] || parts[1].padStart(2, '0');
            return year + "-" + month + "-" + day;
        }
    }
    if (str.includes(':')) {
        const tParts = str.split(':');
        return tParts[0].padStart(2, '0') + ":" + tParts[1].padStart(2, '0');
    }
    return str;
}

function validateField(id, value, rule) {
    const val = value ? value.trim() : "";
    const rulesArray = Array.isArray(fieldRules) ? fieldRules : Object.values(fieldRules);
    const ruleObj = rulesArray.find(r => r.field_id === id);
    const errorMsg = ruleObj ? ruleObj.error_msg : "Invalid Entry";

    if (!rule || rule === 'NULL' || val === "") {
        return val !== "";
    }

    if (rule === 'MOB') return /^[6-9]\d{9}$/.test(val);
    if (rule === 'PIN') return /^\d{6}$/.test(val);
    if (rule === 'EMAIL') return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);

    // --- ARRIVAL DATE (ESD) - UNTOUCHED ---
    if (rule.includes("ESD")) {
        const isoInput = translateToISO(val);
        const isoConfig = translateToISO(eventConfig.event_start_date);
        if (isoInput && isoConfig && isoInput > isoConfig) {
            alert("❌ " + errorMsg);
            let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
            if (targetBox) targetBox.value = "";
            updateButtonState();
            return false;
        }
    }



// --- SMART ARRIVAL TIME (T SHOULD BE <EST) ---
    if (rule.includes("T SHOULD BE <EST")) {
        const dateEl = document.getElementById('arrival_date') || document.getElementById('extra_arrival_date');
        const userArrivalDate = dateEl ? dateEl.value : "";

        // Normalize Dates to ISO (YYYY-MM-DD) for accurate comparison
        const userDateISO = translateToISO(userArrivalDate);
        const eventDateISO = translateToISO(eventConfig.event_start_date);

        // SCENARIO B: If Arrival Date is earlier than Event Start Date, it is ALWAYS VALID.
        if (userDateISO < eventDateISO) {
            return true; 
        }

        // SCENARIO A: If Arrival Date is the SAME as Event Start Date, check the Time.
        if (userDateISO === eventDateISO) {
            const isoInputTime = translateToISO(val); // User entered time
            const isoConfigTime = translateToISO(eventConfig.event_start_time); // Config start time

            // Trigger error only if Arrival Time is NOT earlier than Start Time
            if (isoInputTime >= isoConfigTime) {
                alert("❌ " + errorMsg);
                let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
                if (targetBox) targetBox.value = "";
                updateButtonState();
                return false;
            }
        }
    }





  
    
    // --- DEPARTURE DATE (EED) - UNTOUCHED ---
    if (rule.includes("EED")) {
        const isoInput = translateToISO(val);
        const isoConfig = translateToISO(eventConfig.event_end_date);
        if (isoInput && isoConfig && isoInput < isoConfig) {
            alert("❌ " + errorMsg);
            let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
            if (targetBox) targetBox.value = "";
            updateButtonState();
            return false;
        }
    }
// --- SMART DEPARTURE TIME (T SHOULD BE >EET) ---
    if (rule.includes("T SHOULD BE >EET")) {
        const dateEl = document.getElementById('depart_date') || document.getElementById('extra_depart_date');
        const userDepartDate = dateEl ? dateEl.value : "";

        // Normalize Dates for comparison
        const userDateISO = translateToISO(userDepartDate);
        const eventEndDateISO = translateToISO(eventConfig.event_end_date);

        // SCENARIO B: If Departure Date is LATER than Event End Date, it is ALWAYS VALID.
        if (userDateISO > eventEndDateISO) {
            return true;
        }

        // SCENARIO A: If Departure Date is the SAME as Event End Date, check the Time.
        if (userDateISO === eventEndDateISO) {
            const isoInputTime = translateToISO(val); // User entered departure time
            const isoConfigTime = translateToISO(eventConfig.event_end_time); // Config end time

            // Trigger error if Departure Time is NOT later than Event End Time
            // (i.e., if they try to leave before or exactly at the end time)
            if (isoInputTime <= isoConfigTime) {
                alert("❌ " + errorMsg);
                let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
                if (targetBox) targetBox.value = "";
                updateButtonState();
                return false;
            }
        }
    }

 
    return true;
}
