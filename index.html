<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiple Events Registration System</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
    .card { width: 100%; max-width: 480px; background: white; padding: 0 0 30px 0; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
    .header-image-container { width: 100%; overflow: hidden; display: none; border-bottom: 3px solid #1a237e; }
    .header-image { width: 100%; height: auto; display: block; object-fit: contain; }
    .form-content { padding: 20px 25px; }
    .title { font-size: 22px; font-weight: 700; color: #1a237e; margin-bottom: 10px; text-align: center; }
    .subtitle { font-size: 14px; color: #5f6368; margin-bottom: 25px; text-align: center; line-height: 1.4; }
    .input-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #3c4043; margin-bottom: 8px; }
    input, select { width: 100%; padding: 12px; border: 1.5px solid #dadce0; border-radius: 8px; font-size: 15px; transition: all 0.3s; box-sizing: border-box; }
    input:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26, 35, 126, 0.1); }
    .btn { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
    .btn:hover { background: #0d1440; }
    .btn-secondary { background: white; color: #1a237e; border: 1.5px solid #1a237e; margin-top: 15px; }
    .btn-secondary:hover { background: #f8f9fa; }
    #Section2 { display: none; }
    .loader { display: none; text-align: center; margin: 20px 0; color: #1a237e; font-weight: 600; }
    
    /* DIAGNOSTIC HUB STYLE */
    #mers-diag-hub {
        background: #e8eaf6;
        border: 1px solid #1a237e;
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 20px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        color: #1a237e;
    }
    .diag-line { display: flex; justify-content: space-between; margin-bottom: 4px; border-bottom: 1px dashed #c5cae9; padding-bottom: 2px; }
</style>
</head>
<body>

<div class="card">
    <div id="headerImageContainer" class="header-image-container">
        <img id="eventBanner" class="header-image" src="" alt="Event Banner">
    </div>

    <div class="form-content">
        <div id="Section1">
            <div class="title" id="eventTitle">Loading Event...</div>
            <p class="subtitle" id="eventSubtitle">Please provide your details.</p>
            
            <div id="registrationForm">
                <div class="input-group">
                    <label>Registration ID (For Edits)</label>
                    <input type="text" id="regId" placeholder="Enter ID to edit previous data">
                </div>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="full_name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <button class="btn" id="btn-next-to-extra">Next: Event Logistics</button>
            </div>
        </div>

        <div id="Section2">
            <div id="mers-diag-hub">
                <div style="font-weight:bold; margin-bottom:5px; text-decoration:underline;">MERS DIAGNOSTIC HUB</div>
                <div class="diag-line"><span>Event Start:</span> <span id="diag-evt-start">-</span></div>
                <div class="diag-line"><span>User Arrival:</span> <span id="diag-usr-arr">-</span></div>
                <div class="diag-line"><span>Event End:</span> <span id="diag-evt-end">-</span></div>
                <div class="diag-line"><span>User Departure:</span> <span id="diag-usr-dep">-</span></div>
            </div>

            <div class="title">Logistics & Preferences</div>
            <p class="subtitle">Please complete the following details for your registration.</p>
            <div id="extra-sections-container"></div>
            <div id="submit-loader" class="loader">Submitting your registration...</div>
            <button class="btn" id="btn-final-submit">Complete Registration</button>
            <button class="btn btn-secondary" id="btn-back-to-profile">Back</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        databaseURL: "https://mers-35e69-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let eventConfig = {};
    let mersTempData = {};
    let originalData = null;

    // --- UTILITY: DATE TRANSLATOR ---
    // Converts "1-Mar-2026" or "10-Mar-2026" to "2026-03-01" / "2026-03-10"
    function formatFirebaseDate(fbDate) {
        if (!fbDate) return "";
        try {
            const parts = fbDate.split('-');
            if (parts.length !== 3) return "";
            
            const day = parts[0].padStart(2, '0');
            const monthStr = parts[1];
            const year = parts[2];
            
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const monthIndex = months.indexOf(monthStr);
            if (monthIndex === -1) return "";
            
            const month = String(monthIndex + 1).padStart(2, '0');
            return `${year}-${month}-${day}`;
        } catch (e) {
            console.error("Date Translation Error:", e);
            return "";
        }
    }

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId') || 'EVT001';
        const mode = urlParams.get('mode');
        const regIdParam = urlParams.get('regId');

        // 1. Fetch Event Config
        const configSnapshot = await db.ref(`Event_Config/${eventId}`).once('value');
        eventConfig = configSnapshot.val() || {};

        if (eventConfig.event_banner_url) {
            const banner = document.getElementById('eventBanner');
            banner.src = eventConfig.event_banner_url;
            document.getElementById('headerImageContainer').style.display = 'block';
        }

        document.getElementById('eventTitle').innerText = eventConfig.event_name || "Event Registration";
        
        // Populate Diagnostic Hub
        document.getElementById('diag-evt-start').innerText = formatFirebaseDate(eventConfig.event_start_date) + " (" + (eventConfig.event_start_time || "") + ")";
        document.getElementById('diag-evt-end').innerText = formatFirebaseDate(eventConfig.event_end_date) + " (" + (eventConfig.event_end_time || "") + ")";

        // 2. Pre-fill if in Edit Mode
        if (mode === 'edit' && regIdParam) {
            const regSnapshot = await db.ref(`registrations/${eventId}/${regIdParam}`).once('value');
            originalData = regSnapshot.val();
            if (originalData) {
                document.getElementById('regId').value = regIdParam;
                document.getElementById('full_name').value = originalData.full_name || '';
                document.getElementById('email').value = originalData.email || '';
            }
        }
    }

    // --- SECTION 2 BUILDER WITH WATERFALL & INTERLOCKS ---
    async function buildExtraSections() {
        const container = document.getElementById('extra-sections-container');
        container.innerHTML = '<div class="loader" style="display:block;">Loading options...</div>';

        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId') || 'EVT001';

        const rulesSnapshot = await db.ref('Field_Rules').orderByChild('event_id').equalTo(eventId).once('value');
        const rules = [];
        rulesSnapshot.forEach(child => { rules.push(child.val()); });
        rules.sort((a, b) => a.sequence_order - b.sequence_order);

        container.innerHTML = '';

        rules.forEach(rule => {
            const fieldId = rule.field_id;
            const inputId = 'extra_' + fieldId;
            const fieldLower = fieldId.toLowerCase();

            const fieldWrapper = document.createElement('div');
            fieldWrapper.className = 'input-group';
            fieldWrapper.id = 'wrapper_' + inputId;

            const label = document.createElement('label');
            label.innerText = rule.field_label;
            fieldWrapper.appendChild(label);

            let input;
            if (rule.field_type === 'dropdown') {
                input = document.createElement('select');
                const options = rule.options.split(',');
                options.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt.trim();
                    option.text = opt.trim();
                    input.appendChild(option);
                });
            } else {
                input = document.createElement('input');
                input.type = rule.field_type || 'text';
            }

            input.id = inputId;
            
            // Restore Memory
            if (mersTempData[inputId]) {
                input.value = mersTempData[inputId];
            } else if (originalData && originalData[inputId]) {
                input.value = originalData[inputId];
            }

            fieldWrapper.appendChild(input);

            // --- SURGICAL WATERFALL & VALIDATION LOGIC ---
            
            // 1. Initial State: Hide all Travel fields except Arrival Date
            const isArrivalDate = (fieldLower === 'arrival_date');
            const isTravelField = fieldLower.includes('arrival') || fieldLower.includes('departure');

            if (isTravelField && !isArrivalDate) {
                fieldWrapper.style.display = 'none';
            }

            input.addEventListener('change', function() {
                const val = this.value;
                if (!val) return;

                const eventStart = formatFirebaseDate(eventConfig.event_start_date);
                const eventEnd = formatFirebaseDate(eventConfig.event_end_date);

                // LOGIC A: ARRIVAL DATE
                if (fieldLower === 'arrival_date') {
                    document.getElementById('diag-usr-arr').innerText = val;
                    if (eventStart && val > eventStart) {
                        alert("❌ Error: Arrival date cannot be after the Event Start Date (" + eventConfig.event_start_date + ")");
                        this.value = ""; return;
                    }
                    // Waterfall Reveal: Show Arrival Time
                    const next = document.getElementById('wrapper_extra_arrival_time');
                    if (next) next.style.display = 'block';
                }

                // LOGIC B: ARRIVAL TIME
                if (fieldLower === 'arrival_time') {
                    const arrDateInput = document.getElementById('extra_arrival_date');
                    const arrDate = arrDateInput ? arrDateInput.value : "";
                    const startTime = (eventConfig.event_start_time || "00:00").padStart(5, '0');
                    
                    if (arrDate === eventStart && val > startTime) {
                        alert("❌ Error: On Day 1, Arrival Time must be before " + eventConfig.event_start_time);
                        this.value = ""; return;
                    }
                    // Waterfall Reveal: Show Departure Date
                    const next = document.getElementById('wrapper_extra_departure_date');
                    if (next) next.style.display = 'block';
                }

                // LOGIC C: DEPARTURE DATE
                if (fieldLower === 'departure_date') {
                    document.getElementById('diag-usr-dep').innerText = val;
                    const arrDate = document.getElementById('extra_arrival_date').value;
                    
                    if (arrDate && val < arrDate) {
                        alert("❌ Error: Departure cannot be before Arrival.");
                        this.value = ""; return;
                    }
                    if (eventEnd && val < eventEnd) {
                        alert("❌ Error: Departure cannot be before the Event End Date (" + eventConfig.event_end_date + ")");
                        this.value = ""; return;
                    }
                    // Waterfall Reveal: Show Departure Time
                    const next = document.getElementById('wrapper_extra_departure_time');
                    if (next) next.style.display = 'block';
                }

                // LOGIC D: DEPARTURE TIME
                if (fieldLower === 'departure_time') {
                    const depDateInput = document.getElementById('extra_departure_date');
                    const depDate = depDateInput ? depDateInput.value : "";
                    const endTime = (eventConfig.event_end_time || "00:00").padStart(5, '0');
                    
                    if (depDate === eventEnd && val < endTime) {
                        alert("❌ Error: On the last day, Departure must be after " + eventConfig.event_end_time);
                        this.value = ""; return;
                    }
                }
                
                // Save progress to memory
                mersTempData[inputId] = val;
            });

            container.appendChild(fieldWrapper);
        });
    }

    // --- NAVIGATION LOGIC ---
    document.getElementById('btn-next-to-extra').onclick = function() {
        const name = document.getElementById('full_name').value;
        const email = document.getElementById('email').value;

        if (!name || !email) {
            alert("Please provide your name and email.");
            return;
        }

        document.getElementById('Section1').style.display = 'none';
        document.getElementById('Section2').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        buildExtraSections();
    };

    document.getElementById('btn-back-to-profile').onclick = function() {
        document.getElementById('Section2').style.display = 'none';
        document.getElementById('Section1').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    document.getElementById('btn-final-submit').onclick = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId') || 'EVT001';
        
        const data = {
            full_name: document.getElementById('full_name').value,
            email: document.getElementById('email').value,
            timestamp: new Date().toISOString(),
            event_id: eventId
        };

        const extraInputs = document.querySelectorAll('[id^="extra_"]');
        extraInputs.forEach(input => {
            data[input.id] = input.value;
        });

        document.getElementById('btn-final-submit').style.display = 'none';
        document.getElementById('submit-loader').style.display = 'block';

        const existingId = document.getElementById('regId').value;
        const finalRegId = existingId || 'REG' + Date.now();

        try {
            await db.ref(`registrations/${eventId}/${finalRegId}`).set(data);
            alert("Success! Your registration (ID: " + finalRegId + ") has been saved.");
            location.reload();
        } catch (e) {
            alert("Submission failed. Please try again.");
            document.getElementById('btn-final-submit').style.display = 'block';
            document.getElementById('submit-
