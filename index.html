<script>

/**

FIXED RENDERFORM

This builds the Section 1 UI.
*/
function renderForm() {
const container = document.getElementById('dynamic-fields');
container.innerHTML = '';

fieldRules.forEach(r => {
const secValue = r.section_number ? String(r.section_number).trim() : "";
if (secValue !== "Section1") return;

 const div = document.createElement(&#39;div&#39;);
 // FIXED: Used r.field_id (not fieldId)
 div.id = `container_${r.field_id}`;
 div.className = &#39;field-container&#39;;
 div.style.display = (r.initial_state === &#39;Hidden&#39;) ? &#39;none&#39; : &#39;block&#39;;

 const needsEditLink = [&#39;Editable&#39;, &#39;Editable_Verify&#39;, &#39;Editable_Lookup&#39;].includes(r.edit_behavior);

 div.innerHTML = `
     &lt;div class=&quot;label-row&quot;&gt;
         &lt;label&gt;${r.display_label || r.field_id}&lt;/label&gt;
         ${needsEditLink ? `&lt;span class=&quot;edit-link&quot; id=&quot;edit-link-${r.field_id}&quot; style=&quot;display:none;&quot; onclick=&quot;unlockField(&#39;${r.field_id}&#39;)&quot;&gt;Edit&lt;/span&gt;` : &#39;&#39;}
     &lt;/div&gt;
     &lt;input type=&quot;text&quot; id=&quot;inp-${r.field_id}&quot; oninput=&quot;onInputChange(&#39;${r.field_id}&#39;, this.value)&quot; disabled autocomplete=&quot;off&quot;&gt;
     &lt;div class=&quot;help-text&quot; id=&quot;help-${r.field_id}&quot;&gt;${r.field_help_text || &#39;&#39;}&lt;/div&gt;
     &lt;div class=&quot;error-msg-text&quot; id=&quot;err-${r.field_id}&quot;&gt;&lt;/div&gt;
     &lt;div class=&quot;dropdown&quot; id=&quot;res-${r.field_id}&quot;&gt;&lt;/div&gt;
     &lt;div id=&quot;vmsg-${r.field_id}&quot; style=&quot;font-size:13px; margin-top:5px; font-weight:bold; display:none;&quot;&gt;&lt;/div&gt;
     ${(r.field_id === &#39;email&#39; || r.field_id === &#39;mobile&#39;) ? `
         &lt;div class=&quot;verify-panel&quot; id=&quot;panel-${r.field_id}&quot;&gt;
             ${r.field_id === &#39;email&#39; ? `&lt;button type=&quot;button&quot; class=&quot;verify-btn&quot; onclick=&quot;manualFormatCheck()&quot;&gt;Check Email Format&lt;/button&gt;` : &#39;&#39;}
             &lt;button class=&quot;verify-btn&quot; id=&quot;vbtn-${r.field_id}&quot; onclick=&quot;sendCode(&#39;${r.field_id}&#39;)&quot;&gt;&lt;/button&gt;
             &lt;div id=&quot;box-${r.field_id}&quot; style=&quot;display:none;&quot;&gt;
                 &lt;input type=&quot;text&quot; placeholder=&quot;Enter 6-digit code&quot; id=&quot;code-${r.field_id}&quot; oninput=&quot;verifyCodeInput(&#39;${r.field_id}&#39;, this.value)&quot;&gt;
             &lt;/div&gt;
         &lt;/div&gt;
     ` : &#39;&#39;}
 `;
 container.appendChild(div);

 if (r.field_id === &#39;full_name&#39;) {
     div.style.display = &#39;block&#39;;
     document.getElementById(&#39;inp-full_name&#39;).disabled = false;
 }


});
}

/**

FIXED SELECTPARTICIPANT

This runs when you click a name in the dropdown.
*/
function selectParticipant(p) {
fieldRules.forEach(r => {
// FIXED: Removed 'extra_' from search logic
const el = document.getElementById(inp-${r.field_id});
const cont = document.getElementById(container_${r.field_id});
const editLink = document.getElementById(edit-link-${r.field_id});

 if (el) {
     const masterValue = p[r.field_id] || p[r.field_id.replace(&#39;_&#39;, &#39; &#39;)] || &quot;&quot;;
     el.value = masterValue;

     // FIXED: Removed &#39;extra_&#39; from data storage
     originalData[r.field_id] = masterValue;

     // SAFETY: Check if container exists before setting style
     if (cont) {
         cont.style.display = (r.initial_state === &#39;Hidden&#39;) ? &#39;none&#39; : &#39;block&#39;;
     }
     el.disabled = true;
     if (editLink) editLink.style.display = &#39;none&#39;;
 }


});

// Close the dropdown and show start buttons
if(document.getElementById('res-full_name')) document.getElementById('res-full_name').style.display = 'none';
if(document.getElementById('btns-start')) document.getElementById('btns-start').style.display = 'flex';
if(document.getElementById('inp-full_name')) document.getElementById('inp-full_name').disabled = true;

checkAllValidations();
}

/**

FIXED BUILDEXTRASECTIONS

This builds the Section 3 fields.
*/
function buildExtraSections() {
const container = document.getElementById('extra-sections-container');
container.innerHTML = '';

moreSections.forEach(field => {
const fieldId = field.field_id; // Clean ID
const wrapper = document.createElement('div');

 // FIXED: Using consistent wrapper_ naming
 wrapper.id = `wrapper_${fieldId}`;
 wrapper.className = &#39;extra-field-wrapper&#39;;

 // Logical visibility
 const isDependent = !!field.parent_field;
 wrapper.style.display = isDependent ? &#39;none&#39; : &#39;block&#39;;

 wrapper.innerHTML = `
     &lt;label class=&quot;extra-label&quot;&gt;${field.display_label}&lt;/label&gt;
     &lt;input type=&quot;text&quot; class=&quot;extra-input&quot; id=&quot;${fieldId}&quot; 
            placeholder=&quot;${field.placeholder || &#39;&#39;}&quot;
            oninput=&quot;handleExtraInput(&#39;${fieldId}&#39;)&quot;&gt;
     &lt;div class=&quot;extra-error&quot; id=&quot;err_${fieldId}&quot;&gt;&lt;/div&gt;
 `;
 container.appendChild(wrapper);


});
}

// ... [Keep the rest of your script, especially handleExtraInput and validations] ...
</script>
