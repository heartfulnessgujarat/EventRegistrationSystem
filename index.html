<script>

function formatFirebaseDate(fbDate) {
    if (!fbDate) return "";
    try {
        // This handles "1-Mar-2026" by splitting at the dashes
        const parts = fbDate.split('-');
        if (parts.length !== 3) return "";
        
        const day = parts[0].padStart(2, '0');
        const monthStr = parts[1];
        const year = parts[2];
        
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const monthIndex = months.indexOf(monthStr);
        if (monthIndex === -1) return "";
        
        const month = String(monthIndex + 1).padStart(2, '0');
        return `${year}-${month}-${day}`;
    } catch (e) {
        console.error("Date Translation Error:", e);
        return "";
    }
}


  let verificationAttempts = { email: 0, mobile: 0 };

/** --- START: GATEKEEPER HELPER FUNCTIONS --- **/
function getISTDate() {
  const now = new Date();
  const istOffset = 5.5 * 60 * 60 * 1000;
  const istTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + istOffset);
  istTime.setHours(0, 0, 0, 0); 
  return istTime;
}

function parseCustomDate(dateStr) {
  if (!dateStr || typeof dateStr !== 'string' || dateStr.trim() === "") return null;
  const months = {
    "Jan": 0, "Feb": 1, "Mar": 2, "Apr": 3, "May": 4, "Jun": 5,
    "Jul": 6, "Aug": 7, "Sep": 8, "Oct": 9, "Nov": 10, "Dec": 11
  };
  const parts = dateStr.split('-');
  if (parts.length !== 3) return null;
  const day = parseInt(parts[0], 10);
  const month = months[parts[1]];
  const year = parseInt(parts[2], 10);
  if (isNaN(day) || month === undefined || isNaN(year)) return null;
  return new Date(year, month, day);
}

function blockUIWithNotice(message) {
  document.body.innerHTML = `
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; font-family: sans-serif;">
      <div style="text-align: center; padding: 40px; border-radius: 12px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 90%;">
        <div style="font-size: 50px; margin-bottom: 20px;">🗓️</div>
        <h2 style="color: #333; margin-bottom: 15px;">Registration Notice</h2>
        <p style="font-size: 18px; color: #555; line-height: 1.5;">${message}</p>
      </div>
    </div>`;
  throw new Error("Registration Locked: " + message);
}
/** --- END: GATEKEEPER HELPER FUNCTIONS --- **/



  
  async function init() {

console.log("%c MERS PING 1: Init sequence started. CurrentSection is: " + (typeof currentSection !== 'undefined' ? currentSection : 'UNDEFINED'), "color: orange;");

    
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const mode = (urlParams.get('mode') || 'new').toLowerCase();
        const regId = urlParams.get('regId');

        // 1. Fetch Config from Firebase
        const configSnap = await db.ref('config/eventConfig').once('value');
        const allConfigs = configSnap.val() || {};
        eventConfig = allConfigs[eventId];
        
        if (!eventConfig) {
            document.getElementById('loading-init').innerHTML = "<h2>Event Not Found</h2>";
            return;
        }

        // 2. DATE CHECK (Gatekeeper Tier 1)
        const today = getISTDate();
        const startDate = parseCustomDate(eventConfig.reg_start_date);
        const endDate = parseCustomDate(eventConfig.reg_end_date);

        if (startDate && endDate) {
            if (today < startDate || today > endDate) {
                blockUIWithNotice(eventConfig.reg_close_msg || "Registration is currently closed.");
                return; 
            }
        }

// 3. CAPACITY CHECK (Gatekeeper Tier 2 - Now using Active Seats)
        if (mode === 'new') {
            // We now point to 'active_seats' instead of 'counters' 
            // to allow people to fill seats released by cancellations.
            const seatSnap = await db.ref('active_seats/' + eventId).once('value');
            const currentOccupancy = Number(seatSnap.val() || 0); 
            const maxCapacity = Number(eventConfig.hall_capacity || 0);

            console.log(`[CAPACITY CHECK] Occupancy: ${currentOccupancy} / Max: ${maxCapacity}`);

            if (maxCapacity > 0 && currentOccupancy >= maxCapacity) {
                blockUIWithNotice(eventConfig.hall_capacity_full_msg || "Hall Capacity is full.");
                return; 
            }
        }



      
        // 4. LOAD UI COMPONENTS
        const [thankSnap, bannerSnap] = await Promise.all([
            db.ref('htmlStorage/' + eventId + '/thank').once('value'),
            db.ref('htmlStorage/' + eventId + '/banner').once('value')
        ]);

        eventConfig.final_html = thankSnap.val() || "<h2>Registration Successful!</h2>";
        const bannerHtml = bannerSnap.val(); 

        document.getElementById('title').innerHTML = eventConfig.title || "Registration";

        const container = document.getElementById('header-img-cont');
        if (bannerHtml && container) {
            container.innerHTML = bannerHtml;
            container.style.display = 'block';
        } else if (container) {
            container.style.display = 'none';
        }
      
        document.getElementById('subtitle').innerHTML = eventConfig.subtitle || "";
        
        // --- MERS: DATA BRIDGE ---
        
        // 1. Load Field Rules (Filtering for this specific Event ID)
        try {
            const rulesSnap = await db.ref('config/fieldRules').once('value');
            const allRules = rulesSnap.val() || {};
            fieldRules = Object.values(allRules).filter(r => String(r.event_id).toUpperCase() === eventId);
            console.log("MERS: Field Rules Loaded:", fieldRules.length);
        } catch (ruleErr) {
            console.error("MERS: Field Rules fetch error:", ruleErr);
            fieldRules = [];
        }

        // 2. Load More Sections (Correcting path to camelCase 'moreSections')
        try {
            const sectionsSnap = await db.ref('config/moreSections').once('value');
            if (sectionsSnap.exists()) {
                const allSections = sectionsSnap.val() || {};
                moreSections = Object.values(allSections);
                console.log("MERS: moreSections Loaded from Firebase:", moreSections.length);
            } else {
                console.warn("MERS: No data found at 'config/moreSections'.");
                moreSections = [];
            }
        } catch (secErr) {
            console.error("MERS: moreSections fetch error:", secErr);
            moreSections = [];
        }

        // --- END MERS DATA BRIDGE ---
        
        // --- ROUTING LOGIC ---
        if (mode === 'edit' || mode === 'delete') {
            if (regId) {
                loadExistingData(regId, mode); 
            } else {
                alert("Invalid Link: Registration ID missing.");
                location.href = window.location.pathname + "?id=" + eventId;
            }
        } else {
            // Normal New Registration
            renderForm();
            document.getElementById('loading-init').style.display = 'none';
            document.getElementById('form-content').style.display = 'block';
        }
        
    } catch (e) { 
        console.error("Initialization Error:", e);
        document.getElementById('loading-init').innerHTML = "<h2>Error loading form. Please refresh.</h2>";
    }

  //  if (section2) {
   //     section2.prepend(diag);
  //  }
    
}

  
  function renderForm() {
  const container = document.getElementById('dynamic-fields');
  container.innerHTML = '';
  
  fieldRules.forEach(r => {
    
    // --- MERS SURGERY START: Bulletproof Section Filter ---
    // 1. Convert the section value to a clean string
    const secValue = r.section_number ? String(r.section_number).trim() : "";
    
    // 2. LOGIC: If a field is NOT explicitly Section1, skip it.
    // This will catch "Section2", "Section3", and even blank values.
    if (secValue !== "Section1") {
      return; 
    }
    // --- MERS SURGERY END ---

    const div = document.createElement('div');
    div.className = 'field-container';
    div.id = `cont-${r.field_id}`;
    div.style.display = (r.initial_state === 'Hidden') ? 'none' : 'block';
    const needsEditLink = ['Editable', 'Editable_Verify', 'Editable_Lookup'].includes(r.edit_behavior);
    
    div.innerHTML = `
      <div class="label-row">
        <label>${r.display_label || r.field_id}</label>
        ${needsEditLink ? `<span class="edit-link" id="edit-link-${r.field_id}" style="display:none;" onclick="unlockField('${r.field_id}')">Edit</span>` : ''}

          <button class="verify-btn" id="vbtn-${r.field_id}"

}


 
  async function onInputChange(fId, val) {
  if (fId === 'full_name' || fId === 'centre') handleSearch(fId, val);
  checkAllValidations();
}



  
function renderDropdown(div, list, type) {
  div.innerHTML = '';
  
  if (list.length > 0) {
    div.style.display = 'block';
    
    list.forEach(item => {
      const d = document.createElement('div');
      d.className = 'item'; 
      
      // 1. SURGICAL FIX: Display the correct text based on type
      // If it's a 'loc' object, show the 'centre' property.
      // If it's a name string, show the string.
      const displayValue = (type === 'loc') ? (item.centre || item) : item;
      d.textContent = displayValue; 
      
      d.onclick = () => {
        if (type === 'loc') {
          // 2. THE CHAIN REACTION: 
          // We already have the full object (item) from handleSearch!
          // No need to search masterData again. Just pass it directly.
          selectLocation(item); 
          
        } else {
          // This remains the same for the initial Name search
          const person = masterData.find(x => {
            const name = x.full_name || x['Full Name'] || "";
            return String(name).trim() === item;
          });
          if (person) {
            selectParticipant(person); 
          }
        }
        div.style.display = 'none';
      };
      div.appendChild(d);
    });
  } else { 
    div.style.display = 'none'; 
  }
}


async function handleSearch(fId, val) {
  const resDiv = document.getElementById(`res-${fId}`);
  if (val.length < 3) { resDiv.style.display = 'none'; return; }
  
  const rule = fieldRules.find(r => r.field_id === fId);
  const lookupTab = rule ? rule.lookup_tab : "Master_Internal_DB"; // Fallback to Master if rule is loading

  /** * THE "SCENARIO B" FIX: 
   * During an Email Edit, masterData.length is exactly 1 (the user's record).
   * We force a fetch if we are searching a lookup field like 'centre'
   * to ensure the system "wakes up" and sees the whole database.
   */
  if (lookupTab && (masterData.length <= 1 || fId === 'centre')) { 

// OLD LINE: const snap = await db.ref(lookupTab).once('value');
// NEW SURGICAL UPDATE:
const snap = await db.ref('masters/' + lookupTab).once('value');
    
    
    
    const raw = snap.val() || {};
    masterData = Array.isArray(raw) ? raw : Object.values(raw);
  }

  const searchVal = val.toLowerCase();

  // --- FULL NAME SEARCH LOGIC ---
  if (fId === 'full_name') {
    const allMatches = masterData
      .filter(x => {
        const n = x.full_name || x['Full Name'] || "";
        return String(n).toLowerCase().includes(searchVal);
      })
      .map(x => String(x.full_name || x['Full Name'] || "").trim());

    const uniqueNames = [...new Set(allMatches)];
    renderDropdown(resDiv, uniqueNames.slice(0, 8), 'name');

  // --- CENTRE SEARCH LOGIC ---
  } else if (fId === 'centre') {
    const matchedObjects = masterData.filter(x => {
      // Direct property access as per your verified column titles
      const c = x.centre || x['Centre'] || ""; 
      return String(c).toLowerCase().includes(searchVal);
    });

    // UNIQUE: Ensure cities like "Navsari" only appear once in the dropdown
    const uniqueMap = new Map();
    matchedObjects.forEach(item => {
      const cityName = String(item.centre || item['Centre'] || "").trim();
      if (cityName && !uniqueMap.has(cityName.toLowerCase())) {
        uniqueMap.set(cityName.toLowerCase(), item);
      }
    });

    const finalUniqueList = Array.from(uniqueMap.values());
    renderDropdown(resDiv, finalUniqueList.slice(0, 8), 'loc');
  }
}



function selectParticipant(p) {
  // --- MERS CRITICAL UPDATE: LOCK NAME INTO MEMORY ---
  // This ensures the "Blocked Package" data is saved even if the input is disabled.
  if (typeof mersTempData !== 'undefined') {
    mersTempData.full_name = p.full_name || p['Full Name'] || "";
  }
  // --------------------------------------------------

  fieldRules.forEach(r => {
    const el = document.getElementById(`inp-${r.field_id}`);
    const cont = document.getElementById(`cont-${r.field_id}`);
    const editLink = document.getElementById(`edit-link-${r.field_id}`);
    
    if (el) {

  }

  const inp = document.getElementById(`inp-${id}`);

  if (id === 'centre') {

  }

  // 4. Existing Email Verification Logic (Preserved)
  if (id === 'email') {
    const checkBtn = document.getElementById('vcheck-email');
    if (checkBtn) checkBtn.style.display = 'block';
    const vBtn = document.getElementById('vbtn-email');

  function sendCode(type) {
    verificationAttempts[type] = 0;
    const msg = document.getElementById(`vmsg-${type}`);
    if (msg) msg.style.display = "none";
    const targetEmail = (type === 'email') ? document.getElementById('inp-email').value : originalData['email'];
    const btn = document.getElementById(`vbtn-${type}`);
    btn.disabled = true;
    btn.innerText = "Sending Code...";
    fetch(`${SCRIPT_URL}?action=sendVerificationCode&email=${encodeURIComponent(targetEmail)}&eventId=${eventId}`, { mode: 'no-cors' });
    setTimeout(() => {
      document.getElementById(`panel-${type}`).style.backgroundColor = "#e3f2fd";
      btn.style.display = "none";
      document.getElementById(`box-${type}`).style.display = "block";
      const codeInp = document.getElementById(`code-${type}`);
      if (codeInp) { codeInp.value = ""; codeInp.disabled = false; }
      startResendTimer(type);
    }, 1500);
  }

  function startResendTimer(type) {
    const container = document.getElementById(`resend-container-${type}`);
    let seconds = 30;
    const interval = setInterval(() => {
      seconds--;
      if (seconds > 0) { container.innerHTML = `<span class="timer-text">Resend in ${seconds}s</span>`; } 
      else { clearInterval(interval); container.innerHTML = `<span class="resend-link" onclick="resendCode('${type}')">Resend Code</span>`; }
    }, 1000);
  }

  function resendCode(type) {
    document.getElementById(`box-${type}`).style.display = "none";
    document.getElementById(`vbtn-${type}`).style.display = "block";
    sendCode(type);
  }

  async function verifyCodeInput(type, code) {
    if (code.length === 6) {
      const emailKey = ((type === 'email') ? document.getElementById('inp-email').value : originalData['email']).replace(/[.#$[\]]/g, "_");
      const snap = await db.ref("verificationCodes/" + emailKey).once('value');
      const data = snap.val();
      const msg = document.getElementById(`vmsg-${type}`);
      const panel = document.getElementById(`panel-${type}`);
      const codeInp = document.getElementById(`code-${type}`);
      if (data && data.code === code && (new Date().getTime() - data.timestamp < 300000)) {
        msg.innerText = "Verified ✅"; msg.style.color = "#2e7d32"; msg.style.display = "block";
        if (panel) panel.style.display = "none";
        document.getElementById(`inp-${type}`).disabled = true;
        verificationStates[type] = true;
        verificationAttempts[type] = 0;
        checkAllValidations();
      } else {
        verificationAttempts[type]++;
        if (verificationAttempts[type] >= 3) {
          msg.innerText = "Too many failed attempts."; msg.style.color = "#d32f2f"; msg.style.display = "block";
          codeInp.disabled = true; codeInp.value = "LOCKED";
        } else {
          msg.innerText = `Invalid Code. Attempt ${verificationAttempts[type]} of 3.`;
          msg.style.color = "#d32f2f"; msg.style.display = "block";
          setTimeout(() => { codeInp.value = ""; codeInp.focus(); }, 1000);
        }
        verificationStates[type] = false;
      }
    }
  }



function checkAllValidations() {
    let allValid = true;
    fieldRules.forEach(r => {
      const input = document.getElementById(`inp-${r.field_id}`);
      const errDiv = document.getElementById(`err-${r.field_id}`);
      if (input) {
        let isValid = validateField(r.field_id, input.value, r.field_validation);
        let isChanged = input.value !== (originalData[r.field_id] || "");
        
        if (!isValid && input.value.trim() !== "") {
          input.style.border = '2px solid red';
          if (errDiv) { errDiv.innerText = r.error_msg || "Invalid input"; errDiv.style.display = 'block'; }
          allValid = false;
        } else {
          input.style.border = '1px solid #ced4da';
          if (errDiv) errDiv.style.display = 'none';
        }

        if (r.field_id === 'email' || r.field_id === 'mobile') {
          const panel = document.getElementById(`panel-${r.field_id}`);
          const vBtn = document.getElementById(`vbtn-${r.field_id}`);
          const msg = document.getElementById(`vmsg-${r.field_id}`);

          if (verificationStates[r.field_id]) {
            if (msg) msg.style.display = 'block'; 
            if (panel) panel.style.display = 'none';
          } 
          else if (isValid && isChanged) {
            vBtn.innerText = `Click here to send Verification Code to ${input.value}`;
            panel.style.display = 'block';
            if (msg) msg.style.display = 'none';
            allValid = false;
          } 
          else {
            if (panel) panel.style.display = 'none';
            if (!isChanged && msg) msg.style.display = 'none';
          }
        }
        
        if (input.value.trim() === "" && r.initial_state === 'Visible') allValid = false;
      }
    });

    const masterBtn = document.getElementById('btn-master-update');
    const regBtn = document.getElementById('btn-register');
    if (masterBtn) masterBtn.disabled = !allValid;
    if (regBtn) regBtn.disabled = !allValid;
  }

async function handleSectionNavigation() {
    console.log("%c MERS PING 3: handleSectionNavigation() was just called!", "color: blue; font-weight: bold;");

async function submitData() {
    console.log("%c [DIAGNOSTIC] submitData started! ", "background: #222; color: #bada55; font-size: 14px;");

    try {
        const urlParams = new URLSearchParams(window.location.search);
        const mode = (urlParams.get('mode') || 'new').toLowerCase();
        
        // --- STEP 1: FINAL DATA CAPTURE ---
        const getFreshVal = (id) => {
            const el = document.getElementById('inp-' + id) || document.getElementById(id);
            if (el) return el.value ? el.value.trim() : "";
            if (typeof mersTempData !== 'undefined' && typeof mersTempData[id] !== 'undefined') return mersTempData[id];
            if (typeof originalData !== 'undefined' && typeof originalData[id] !== 'undefined') return originalData[id];
            return "";
        };

        const updatedSection1 = {
            full_name: getFreshVal('full_name'),
            email: getFreshVal('email'),
            mobile: getFreshVal('mobile'),
            organization: getFreshVal('organization'),
            designation: getFreshVal('designation'),
            pincode: getFreshVal('pincode'),
            full_address: getFreshVal('full_address'),
            centre: getFreshVal('centre'),
            zone: getFreshVal('zone'),
            district: getFreshVal('district')
        };
        
        if (!updatedSection1.full_name) {
            throw new Error("Critical Error: 'full_name' is missing. Please ensure Section 1 is filled.");
        }

        const overlay = document.getElementById('processing-overlay');
        if (overlay) overlay.style.display = 'block';

        // --- STEP 2: UPDATE MASTER DATABASE (EVENT-TYPE AWARE) ---
        const masterRef = db.ref('masters/Master_Internal_DB');
        const eventType = (typeof eventConfig !== 'undefined' && eventConfig.event_type) 
                          ? eventConfig.event_type.toLowerCase() 
                          : 'internal'; 

        if (eventType === 'internal') {
            const nameSearch = await masterRef.orderByChild('full_name').equalTo(updatedSection1.full_name).once('value');
            if (nameSearch.exists()) {
                const masterKey = Object.keys(nameSearch.val())[0];
                await masterRef.child(masterKey).update(updatedSection1);
            } else {
                const mobSearch = await masterRef.orderByChild('mobile').equalTo(updatedSection1.mobile).once('value');
                if (mobSearch.exists()) {
                    const mobKey = Object.keys(mobSearch.val())[0];
                    await masterRef.child(mobKey).update(updatedSection1);
                } else {
                    await masterRef.push(updatedSection1);
                }
            }
        } else {
            const mobSearch = await masterRef.orderByChild('mobile').equalTo(updatedSection1.mobile).once('value');
            if (mobSearch.exists()) {
                const mobKey = Object.keys(mobSearch.val())[0];
                await masterRef.child(mobKey).update(updatedSection1);
            } else {
                await masterRef.push(updatedSection1);
            }
        }

        // --- STEP 3: CONSTRUCT FINAL REGISTRATION OBJECT (DUP-FIX) ---
        let finalRegId = urlParams.get('regId');
        const eventIdParam = typeof eventId !== 'undefined' ? eventId : (urlParams.get('id') || "EVT001");

        // Merge all data
        let formData = {
            ...originalData,
            ...mersTempData,
            ...updatedSection1
        };

        // DUP ENTRY FIX: Explicitly consolidate clean keys into "extra_" keys
        const keysToConsolidate = ['arrival_date', 'arrival_time', 'depart_date', 'depart_time', 'gender', 'travel_mode', 'stay_option'];

        keysToConsolidate.forEach(key => {
            const extraKey = 'extra_' + key;
            // If the clean key exists, move its value to the extra_ key and delete the clean one
            if (formData[key]) {
                formData[extraKey] = formData[key]; 
                delete formData[key]; 
            }
        });

        if (!finalRegId || mode === 'new') {
            const now = new Date();
            const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            const day = String(now.getUTCDate()).padStart(2, '0');
            const month = monthNames[now.getUTCMonth()];
            const year = now.getUTCFullYear();
            const timePart = `${String(now.getUTCHours()).padStart(2, '0')}${String(now.getUTCMinutes()).padStart(2, '0')}${String(now.getUTCSeconds()).padStart(2, '0')}${String(now.getUTCMilliseconds()).padStart(3, '0')}`;
            finalRegId = `${eventIdParam}-REG-${day}-${month}-${year}-${timePart}-000`;
        }

        formData.registration_id = finalRegId;
        formData.event_id = eventIdParam;
        formData.timestamp = new Date().toLocaleString();
        formData.registration_status = (mode === 'new') ? "CONFIRMED" : "EDITED ON " + new Date().toLocaleString();



// --- STEP 4: SAVE DATA & CONDITIONAL COUNTER ---
        if (mode === 'new') {
            console.log("MERS: Processing counters for Event:", eventIdParam);

            // A. ID Sequence (Unique Serial - Never goes down)
            const counterRef = db.ref('counters/' + eventIdParam);
            const transactionResult = await counterRef.transaction((v) => (v || 0) + 1);

            if (transactionResult.committed) {
                const paddedCount = String(transactionResult.snapshot.val()).padStart(3, '0');
                const idParts = formData.registration_id.split('-');
                idParts[idParts.length - 1] = paddedCount;
                formData.registration_id = idParts.join('-');
                console.log("MERS: New ID assigned:", formData.registration_id);
            }

            // B. ACTIVE SEATS (Capacity Control - Created/Updated here)
            try {
                await db.ref('active_seats/' + eventIdParam).transaction((current) => {
                    const nextVal = (current || 0) + 1;
                    return nextVal;
                });
                console.log("MERS: active_seats incremented successfully.");
            } catch (seatErr) {
                console.error("MERS: active_seats transaction failed:", seatErr);
            }
        }


        await db.ref('registrations/' + eventIdParam + '/' + formData.registration_id).set(formData);

        // --- STEP 5: UI TRANSITION ---
        ['Section1', 'Section2', 'Section3', 'btn-next-action', 'btn-back-to-profile'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = 'none';
        });
        
        if (document.querySelector('.event-header')) document.querySelector('.event-header').style.display = 'none';

        const contentDiv = document.getElementById('success-content');
        if (contentDiv) {
            contentDiv.innerHTML = (typeof eventConfig !== 'undefined' && eventConfig.final_html) 
                ? eventConfig.final_html 
                : "<h2>Registration Successful!</h2>";
        }

        document.getElementById('success-screen').style.display = 'block';
        if (overlay) overlay.style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // --- TRIGGER EMAIL ---
        if (typeof SCRIPT_URL !== 'undefined' && SCRIPT_URL) {
            const emailUrl = `${SCRIPT_URL}?action=sendEmail&regId=${encodeURIComponent(formData.registration_id)}&eventId=${eventIdParam}`;
            fetch(emailUrl).catch(err => console.error("Email failed:", err));
        }
        
    } catch (error) {
        console.error("CRASH:", error);
        alert("Save Failed: " + error.message);
        if (document.getElementById('processing-overlay')) {
            document.getElementById('processing-overlay').style.display = 'none';
        }
    }
}

  
  
function manualFormatCheck() {
  const emailInput = document.getElementById('inp-email');
  const emailVal = emailInput.value.trim(); 
  const vBtn = document.getElementById('vbtn-email');
  const checkBtn = document.getElementById('vcheck-email');
  const msg = document.getElementById('vmsg-email');

  const strictRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,6}$/;

  if (strictRegex.test(emailVal)) {
    checkBtn.style.display = 'none';
    vBtn.style.display = 'block';
    vBtn.innerText = `Format accepted, click here to send verification code to ${emailVal}`;
    emailInput.style.border = '1px solid #ced4da';
    if (msg) {
      msg.innerText = "Format Accepted ✅";
      msg.style.color = "#2e7d32";
      msg.style.display = "block";
    }
  } else {
    let errorNote = "Please check for typos or extra characters.";
    if (!emailVal.includes("@")) errorNote = "Missing '@' symbol.";
    else if (!emailVal.includes(".")) errorNote = "Missing a dot (e.g., .com).";
    else if (/\s/.test(emailVal)) errorNote = "Spaces are not allowed within the email.";

    alert("❌ FORMAT ISSUE\n\n" + errorNote);
    vBtn.style.display = 'none';
    emailInput.style.border = '2px solid red';
    emailInput.focus();
  }
}


async function loadExistingData(regId, mode) {

        const eventIdParam = urlParams.get('id') || "EVT001"; // Fetch current event ID

        // PATH A: Check the Master Internal DB (This uses unique push keys)
        let snap = await db.ref('masters/Master_Internal_DB/' + regId).once('value');
        let data = snap.val();

        // PATH B: Check the Event-Specific registrations folder (MERS FOLDER LOGIC)
        if (!data) {
            console.log(`MERS: Checking folder: registrations/${eventIdParam}/${regId}`);
            snap = await db.ref('registrations/' + eventIdParam + '/' + regId).once('value');
            data = snap.val();
        }

        // PATH C: FALLBACK (Check root registrations just in case of old legacy data)
        if (!data) {
            console.log("MERS: Checking root registrations fallback...");
            snap = await db.ref('registrations/' + regId).once('value');
            data = snap.val();
        }

        // --- SUCCESS: DATA FOUND ---
        originalData = data;

        if (mode === 'edit') {

                regBtn.style.opacity = "1";
                regBtn.innerText = "DETAILS ARE OKAY, CLICK HERE TO PROCEED FURTHER";
            }
            
            if (typeof updateButtonState === 'function') updateButtonState();

function buildExtraSections(sectionId) {
    console.log("MERS: Building Section with Memory Check for: " + sectionId);
    
    // 1. DATA SAFETY CHECK
    if (!moreSections || moreSections.length === 0) {
        console.error("MERS: No sections loaded. Retrying...");
        setTimeout(() => buildExtraSections(sectionId), 500);
        return;
    }

    const sectionData = moreSections.find(s => s.section_id === sectionId);
    if (!sectionData || !sectionData.fields) return;

    // 2. CLEAN & PREPARE CONTAINER
    const container = document.getElementById('dynamic-sections-content');
    if (!container) return;
    container.innerHTML = ""; 

    const titleEl = document.getElementById('title-Section2');
    if (titleEl) titleEl.innerText = sectionData.section_title || "";

    // 3. LOOP THROUGH FIELDS AND INJECT DATA
    sectionData.fields.forEach(fieldId => {
        const rule = fieldRules.find(r => r.field_id === fieldId);
        if (!rule) return;

        const fieldWrapper = document.createElement('div');
        fieldWrapper.className = "input-group";
        
        const label = document.createElement('label');
        label.innerText = rule.display_name;
        fieldWrapper.appendChild(label);

        let input;
        if (rule.field_type === "dropdown") {
            input = document.createElement('select');
            // Standard placeholder
            const placeholder = document.createElement('option');
            placeholder.text = "-- Select --";
            placeholder.value = "";
            input.appendChild(placeholder);

            const options = rule.validation_rule ? rule.validation_rule.split(',') : [];
            options.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt.trim();
                o.text = opt.trim();
                input.appendChild(o);
            });
        } else {
            input = document.createElement('input');
            input.type = "text";
        }

        input.id = `extra_${fieldId}`;
        input.className = "mers-input";

        // --- THE CRITICAL MEMORY CHECK ---
        // Look inside originalData for this specific fieldId
        if (typeof originalData !== 'undefined' && originalData && originalData[fieldId] !== undefined) {
            input.value = originalData[fieldId];

  function translateToISO(val) {
    if (!val) return "";
    const str = String(val).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
    if (str.includes('-')) {
        const parts = str.split('-');
        if (parts.length === 3) {
            const day = parts[0].padStart(2, '0');
            const monthStr = parts[1].toLowerCase().substring(0, 3);
            const year = parts[2].length === 2 ? "20" + parts[2] : parts[2];
            const monthsMap = {
                jan: '01', feb: '02', mar: '03', apr: '04', may: '05', jun: '06',
                jul: '07', aug: '08', sep: '09', oct: '10', nov: '11', dec: '12'
            };
            const month = monthsMap[monthStr] || parts[1].padStart(2, '0');
            return year + "-" + month + "-" + day;
        }
    }
    if (str.includes(':')) {
        const tParts = str.split(':');
        return tParts[0].padStart(2, '0') + ":" + tParts[1].padStart(2, '0');
    }
    return str;
}

function validateField(id, value, rule) {
    const val = value ? value.trim() : "";
    const rulesArray = Array.isArray(fieldRules) ? fieldRules : Object.values(fieldRules);
    const ruleObj = rulesArray.find(r => r.field_id === id);
    const errorMsg = ruleObj ? ruleObj.error_msg : "Invalid Entry";

    if (!rule || rule === 'NULL' || val === "") {
        return val !== "";
    }

    if (rule === 'MOB') return /^[6-9]\d{9}$/.test(val);
    if (rule === 'PIN') return /^\d{6}$/.test(val);
    if (rule === 'EMAIL') return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);

    // --- ARRIVAL DATE (ESD) - UNTOUCHED ---
    if (rule.includes("ESD")) {
        const isoInput = translateToISO(val);
        const isoConfig = translateToISO(eventConfig.event_start_date);
        if (isoInput && isoConfig && isoInput > isoConfig) {
            alert("❌ " + errorMsg);
            let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
            if (targetBox) targetBox.value = "";
            updateButtonState();
            return false;
        }
    }



// --- SMART ARRIVAL TIME (T SHOULD BE <EST) ---
    if (rule.includes("T SHOULD BE <EST")) {
        const dateEl = document.getElementById('arrival_date') || document.getElementById('extra_arrival_date');
        const userArrivalDate = dateEl ? dateEl.value : "";

        // Normalize Dates to ISO (YYYY-MM-DD) for accurate comparison
        const userDateISO = translateToISO(userArrivalDate);
        const eventDateISO = translateToISO(eventConfig.event_start_date);

        // SCENARIO B: If Arrival Date is earlier than Event Start Date, it is ALWAYS VALID.
        if (userDateISO < eventDateISO) {
            return true; 
        }

        // SCENARIO A: If Arrival Date is the SAME as Event Start Date, check the Time.
        if (userDateISO === eventDateISO) {
            const isoInputTime = translateToISO(val); // User entered time
            const isoConfigTime = translateToISO(eventConfig.event_start_time); // Config start time

            // Trigger error only if Arrival Time is NOT earlier than Start Time
            if (isoInputTime >= isoConfigTime) {
                alert("❌ " + errorMsg);
                let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
                if (targetBox) targetBox.value = "";
                updateButtonState();
                return false;
            }
        }
    }

      
    // --- DEPARTURE DATE (EED) - UNTOUCHED ---
    if (rule.includes("EED")) {
        const isoInput = translateToISO(val);
        const isoConfig = translateToISO(eventConfig.event_end_date);
        if (isoInput && isoConfig && isoInput < isoConfig) {
            alert("❌ " + errorMsg);
            let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
            if (targetBox) targetBox.value = "";
            updateButtonState();
            return false;
        }
    }
// --- SMART DEPARTURE TIME (T SHOULD BE >EET) ---
    if (rule.includes("T SHOULD BE >EET")) {
        const dateEl = document.getElementById('depart_date') || document.getElementById('extra_depart_date');
        const userDepartDate = dateEl ? dateEl.value : "";

        // Normalize Dates for comparison
        const userDateISO = translateToISO(userDepartDate);
        const eventEndDateISO = translateToISO(eventConfig.event_end_date);

        // SCENARIO B: If Departure Date is LATER than Event End Date, it is ALWAYS VALID.
        if (userDateISO > eventEndDateISO) {
            return true;
        }

        // SCENARIO A: If Departure Date is the SAME as Event End Date, check the Time.
        if (userDateISO === eventEndDateISO) {
            const isoInputTime = translateToISO(val); // User entered departure time
            const isoConfigTime = translateToISO(eventConfig.event_end_time); // Config end time

            // Trigger error if Departure Time is NOT later than Event End Time
            // (i.e., if they try to leave before or exactly at the end time)
            if (isoInputTime <= isoConfigTime) {
                alert("❌ " + errorMsg);
                let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
                if (targetBox) targetBox.value = "";
                updateButtonState();
                return false;
            }
        }
    }

 
    return true;
}

/**
 * NEW: MERS Live Availability Engine (Rooms + Dorms - Gender Aware)
 */


async function getStayAvailability(eventId, gender) {
  const db = firebase.database();

  // ✅ USE EXISTING GLOBAL CONFIG (DO NOT FETCH AGAIN)
  const config = eventConfig;

  if (!config) {
    throw new Error("Event config not loaded");
  }

  const roomCapacity = Number(config.room_capacity) || 0;
  const personsPerRoom = Number(config.persons_per_room) || 2;

  const maleDormCap = Number(config.male_dorm_capacity) || 0;
  const femaleDormCap = Number(config.female_dorm_capacity) || 0;

  const maleDormSize = Number(config.male_dorm_persons_per_dorm) || 0;
  const femaleDormSize = Number(config.female_dorm_persons_per_dorm) || 0;

  // ✅ FETCH REGISTRATIONS (correct path)
  const regSnap = await db.ref(`registrations/${eventId}`).once('value');
  const regs = regSnap.val() || {};

  let maleRoom = 0, femaleRoom = 0;
  let maleDorm = 0, femaleDorm = 0;

  Object.values(regs).forEach(r => {
    if (r.registration_status === "CANCELLED") return;

    const genderVal = r.extra_gender || r.gender;
    const stay = r.extra_stay_option || r.stay_option;

    if (stay === "Room") {
      if (genderVal === "Male") maleRoom++;
      if (genderVal === "Female") femaleRoom++;
    }

    if (stay === "Dormitory") {
      if (genderVal === "Male") maleDorm++;
      if (genderVal === "Female") femaleDorm++;
    }
  });

  // 🛏️ DORM
  const maleDormTotal = maleDormCap * maleDormSize;
  const femaleDormTotal = femaleDormCap * femaleDormSize;

  const dormSeats =
    gender === "Male"
      ? Math.max(0, maleDormTotal - maleDorm)
      : Math.max(0, femaleDormTotal - femaleDorm);

  // 🏠 ROOM
  const totalRoomUsers = maleRoom + femaleRoom;
  const totalRoomsUsed = totalRoomUsers / personsPerRoom;

  let remainingRooms = roomCapacity - totalRoomsUsed;

  let oppositePartial = 0;

  if (gender === "Male") {
    if (femaleRoom % personsPerRoom !== 0) oppositePartial = 1;
  } else {
    if (maleRoom % personsPerRoom !== 0) oppositePartial = 1;
  }

  let availableRooms = Math.floor(remainingRooms - oppositePartial);
  availableRooms = Math.max(0, availableRooms);

  const roomSeats = availableRooms * personsPerRoom;

  return { roomSeats, dormSeats };
}

  container.innerHTML = '<div style="color: #2e7d32;">Checking live availability...</div>';

  try {

    const status = await getStayAvailability(eventId, genderEl.value);

    // ✅ Show availability
    container.innerHTML = `
      <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #c8e6c9; padding-bottom: 5px; margin-bottom: 5px;">
        <span>Available Seats for Room:</span>
        <span style="color: ${status.roomSeats > 0 ? '#2e7d32' : '#d32f2f'};">
          ${status.roomSeats > 0 ? status.roomSeats + ' Seats' : 'Waiting List'}
        </span>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <span>Available Seats for Dorm:</span>
        <span style="color: ${status.dormSeats > 0 ? '#2e7d32' : '#d32f2f'};">
          ${status.dormSeats > 0 ? status.dormSeats + ' Seats' : 'Waiting List'}
        </span>
      </div>
    `;

    // ✅ WAIT for dropdown render, then update safely
    setTimeout(() => {

      const stayEl = document.getElementById('extra_stay_option');

      if (!stayEl || stayEl.tagName !== 'SELECT') return;

      const currentValue = stayEl.value;

      let newOptions = [];

      // Room logic
      if (status.roomSeats > 0) {
        newOptions.push("Room");
      } else {
        newOptions.push("Room (Waiting List)");
      }

      // Dorm logic
      if (status.dormSeats > 0) {
        newOptions.push("Dormitory");
      } else {
        newOptions.push("Dormitory (Waiting List)");
      }

      // Always include outside option
      newOptions.push("I will arrange my own stay outside the venue");

      // Replace options safely
      stayEl.innerHTML = '';

      newOptions.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt;
        option.textContent = opt;
        stayEl.appendChild(option);
      });

      // Restore previous selection if still valid
      if (newOptions.includes(currentValue)) {
        stayEl.value = currentValue;
      }

      console.log("MERS: Dropdown updated correctly");

    }, 200);

    console.log("MERS: Capacity + Options updated for", genderEl.value);

  } catch (error) {
    container.innerHTML = '<div style="color: #d32f2f;">Error loading availability</div>';
    console.error("MERS Error:", error);
  }
}


// ✅ Keep this listener (unchanged)
document.addEventListener('change', updateStayOptions);
console.log("MERS DIAG: Section 2 Listener Active via Delegation");



  
</script>
</body>
