// =====================================================
// ATTENDANCE WINDOW VALIDATION
// =====================================================


function validateAttendanceWindow() {


    try {


        const startDate =

            eventConfig.event_start_date;


        const startTime =

            eventConfig.event_start_time;


        const endDate =

            eventConfig.event_end_date;


        const endTime =

            eventConfig.event_end_time;



        if (

            !startDate ||

            !startTime ||

            !endDate ||

            !endTime

        ) {


            showError(

                "Attendance Window Configuration Missing"

            );


            return false;

        }



        const eventStart =

            parseEventDate(

                startDate,

                startTime

            );


        const eventEnd =

            parseEventDate(

                endDate,

                endTime

            );



        if (

            !eventStart ||

            !eventEnd

        ) {


            showError(

                "Invalid Event Date Configuration"

            );


            return false;

        }



        const attendanceStart =

            new Date(

                eventStart.getTime() -

                (2 * 60 * 60 * 1000)

            );


        const attendanceEnd =

            new Date(

                eventEnd.getTime() +

                (2 * 60 * 60 * 1000)

            );


        const now =

            new Date();



        if (

            now < attendanceStart

        ) {


            showError(

                "Attendance Not Started Yet"

            );


            return false;

        }



        if (

            now > attendanceEnd

        ) {


            showError(

                "Attendance Window Closed"

            );


            return false;

        }



        return true;


    }


    catch (error) {


        console.error(

            "ATTENDANCE WINDOW ERROR:",

            error

        );


        showError(

            "Attendance Window Validation Failed"

        );


        return false;

    }

}

// =====================================================
// CHECK DUPLICATE ATTENDANCE

// =====================================================
// CHECK DUPLICATE ATTENDANCE
// RETURNS LATEST ATTENDANCE RECORD OR FALSE
// =====================================================

async function checkDuplicateAttendance(

    registrationId

) {


    if (

        !duplicatePreventionEnabled

    ) {


        return false;

    }


    const attendanceSnap =

        await db.ref(

            "attendance/" +

            eventId

        )
        .orderByChild(

            "registration_id"

        )
        .equalTo(

            registrationId

        )
        .once(

            "value"

        );


    if (

        !attendanceSnap.exists()

    ) {


        return false;

    }


    const attendanceRecords =

        attendanceSnap.val() || {};


    const records =

        Object.keys(

            attendanceRecords

        ).map(

            firebaseId => ({

                firebase_id:

                    firebaseId,

                ...attendanceRecords[
                    firebaseId
                ]

            })

        );


    records.sort(

        (a, b) =>

            new Date(

                b.attendance_timestamp || 0

            ).getTime()

            -

            new Date(

                a.attendance_timestamp || 0

            ).getTime()

    );


    return records[0] || false;

}

// =====================================================

// =====================================================


function startQRScanner(

    successCallback

) {


    if (

        scannerStarted

    ) {


        return;

    }


    scannerStarted = true;



    const reader =

        document.getElementById(

            "reader"

        );


    reader.innerHTML = "";



    const html5QrCode =

        new Html5Qrcode(

            "reader"

        );



    Html5Qrcode.getCameras()


    .then(

        devices => {


            console.log(

                "CAMERAS:",

                devices

            );



            if (

                !devices.length

            ) {


                showError(

                    "No Camera Found"

                );


                return;

            }



            const cameraId =

                devices[

                    devices.length - 1

                ].id;



            html5QrCode.start(


                cameraId,


                {

                    fps: 10,

                    qrbox: 250

                },


                async decodedText => {


                    try {


                        await html5QrCode.stop();


                    }


                    catch (stopError) {


                        console.warn(

                            "SCANNER STOP WARNING:",

                            stopError

                        );

                    }



                    await successCallback(

                        decodedText

                    );

                },


                errorMessage => {


                    // Normal QR scan misses ignored


                }


            );


        }

    )


    .catch(

        error => {


            console.error(

                "CAMERA ERROR:",

                error

            );


            showError(

                "Camera Access Failed"

            );

        }

    );

}



// =====================================================
// EXTRACT REGISTRATION ID
// =====================================================


function extractRegistrationId(

    qrValue

) {


    const value =

        String(

            qrValue || ""

        ).trim();



    if (

        value.startsWith(

            eventId + "-REG-"

        )

    ) {


        return value;

    }



    try {


        const url =

            new URL(

                value

            );


        const id =

            url.searchParams.get(

                "registration_id"

            );


        if (

            id

        ) {


            return id.trim();

        }


    }


    catch (error) {


        // QR value is not a URL


    }



    return "";

}



// =====================================================
// EXTRACT VENUE SECRET
// =====================================================


function extractVenueSecret(

    qrValue

) {


    let value =

        String(

            qrValue || ""

        ).trim();



    try {


        const url =

            new URL(

                value

            );


        const venue =

            url.searchParams.get(

                "venue"

            );


        if (

            venue

        ) {


            return venue.trim();

        }


    }


    catch (error) {


        // QR value is not a URL


    }



    return value;

}



// =====================================================
// EVENT DATE PARSER
// =====================================================


function parseEventDate(
    dateStr,
    timeStr
) {

    if (
        !dateStr ||
        !timeStr
    ) {

        return null;
    }


    const months = {

        Jan: "01",
        Feb: "02",
        Mar: "03",
        Apr: "04",
        May: "05",
        Jun: "06",
        Jul: "07",
        Aug: "08",
        Sep: "09",
        Oct: "10",
        Nov: "11",
        Dec: "12"

    };


    const parts =
        String(
            dateStr
        ).split("-");


    if (
        parts.length !== 3
    ) {

        return null;
    }


    const day =
        String(
            parts[0]
        ).padStart(
            2,
            "0"
        );


    const month =
        months[
            parts[1]
        ];


    if (
        !month
    ) {

        return null;
    }


    const year =
        parts[2].length === 2
        ? "20" + parts[2]
        : parts[2];


    // =====================================================
    // NORMALIZE EVENT TIME
    // SUPPORTS 7:55, 07:55 AND 07:55:00
    // =====================================================

    const timeParts =
        String(
            timeStr
        ).split(":");


    const hour =
        String(
            timeParts[0]
        ).padStart(
            2,
            "0"
        );


    const minute =
        String(
            timeParts[1] || "00"
        ).padStart(
            2,
            "0"
        );


    const second =
        String(
            timeParts[2] || "00"
        ).padStart(
            2,
            "0"
        );


    const dateTimeString =
        `${year}-${month}-${day}T${hour}:${minute}:${second}`;


    console.log(
        "MERS ATTENDANCE DATE STRING:",
        dateTimeString
    );


    const parsedDate =
        new Date(
            dateTimeString
        );


    console.log(
        "MERS ATTENDANCE PARSED DATE:",
        parsedDate,
        parsedDate.getTime()
    );


    if (
        isNaN(
            parsedDate.getTime()
        )
    ) {

        return null;
    }


    return parsedDate;
}

// =====================================================
// MERS CANONICAL IST DATE-TIME
// FORMAT: YYYY-MM-DD HH:mm:ss
// RETAINED AS SHARED DATE UTILITY
// =====================================================

    
function getISTDateTime() {


    const parts =

        new Intl.DateTimeFormat(

            "en-CA",

            {

                timeZone:

                    "Asia/Kolkata",

                year:

                    "numeric",

                month:

                    "2-digit",

                day:

                    "2-digit",

                hour:

                    "2-digit",

                minute:

                    "2-digit",

                second:

                    "2-digit",

                hour12:

                    false

            }

        ).formatToParts(

            new Date()

        );


    const values = {};


    parts.forEach(

        part => {


            if (

                part.type !== "literal"

            ) {


                values[

                    part.type

                ] =

                    part.value;

            }

        }

    );



    return (

        values.year +

        "-" +

        values.month +

        "-" +

        values.day +

        " " +

        values.hour +

        ":" +

        values.minute +

        ":" +

        values.second

    );

}


    // =====================================================
// SINGLE ATTENDANCE WRITE FUNCTION
// =====================================================

async function writeAttendance(

    registrationId,

    mode

) {


    if (

        !registrationId ||

        !mode

    ) {


        throw new Error(

            "Attendance data incomplete"

        );

    }


    // =====================================================
    // PREPARE ATTENDANCE DATA
    // =====================================================

    const attendanceTimestamp =
        new Date().toISOString();


    const attendanceData = {

        registration_id:
            registrationId,

        attendance_timestamp:
            attendanceTimestamp,

        attendance_mode:
            mode

    };


    // =====================================================
    // WRITE TO FIREBASE
    // =====================================================

    const attendanceRef =

        await db.ref(

            "attendance/" +

            eventId

        ).push(

            attendanceData

        );


    // =====================================================
    // FIREBASE PUSH ID
    // =====================================================

    const firebaseId =

        attendanceRef.key;


    console.log(

        "ATTENDANCE WRITTEN:",

        {

            firebase_id:
                firebaseId,

            event_id:
                eventId,

            registration_id:
                registrationId,

            attendance_timestamp:
                attendanceTimestamp,

            attendance_mode:
                mode

        }

    );


    // =====================================================
    // TRIGGER GOOGLE SHEET SYNC
    // =====================================================

    const syncUrl =

        SCRIPT_URL +

        "?action=syncAttendance" +

        "&eventId=" +

        encodeURIComponent(

            eventId

        ) +

        "&firebaseId=" +

        encodeURIComponent(

            firebaseId

        );


    fetch(

        syncUrl,

        {

            method:
                "GET",

            mode:
                "no-cors"

        }

    );


    console.log(

        "ATTENDANCE SYNC TRIGGERED:",

        firebaseId

    );

}
