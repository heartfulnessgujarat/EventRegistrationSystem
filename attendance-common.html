// =====================================================
// CONVERT DD-MMM-YY TO DATE
// =====================================================

function parseEventDate(dateStr, timeStr) {

    const months = {

        Jan: "01",
        Feb: "02",
        Mar: "03",
        Apr: "04",
        May: "05",
        Jun: "06",
        Jul: "07",
        Aug: "08",
        Sep: "09",
        Oct: "10",
        Nov: "11",
        Dec: "12"
    };

    const parts =
        dateStr.split("-");

    const day =
        parts[0];

    const month =
        months[
            parts[1]
        ];

  const year =
    parts[2].length === 2
    ? "20" + parts[2]
    : parts[2];
    
    return new Date(

        `${year}-${month}-${day}T${timeStr}:00`
    );
}

const eventStart =
    parseEventDate(
        startDate,
        startTime
    );

const eventEnd =
    parseEventDate(
        endDate,

    );

// =====================================================
// CAMERA QR SCANNER
// =====================================================

function startCameraScanner() {


const html5QrCode =
    new Html5Qrcode("reader");

Html5Qrcode.getCameras()

.then(devices => {

    console.log(
    "CAMERAS:",
    devices
);

    if (!devices.length) {

        alert(
            "No camera found"
        );

        return;
    }

    const cameraId =
      //  devices[0].id;
    devices[devices.length - 1].id;

    html5QrCode.start(

        cameraId,

        {
            fps: 10,
            qrbox: 250
        },

        (decodedText) => {

            html5QrCode.stop();

            document.getElementById(
                "venueQRInput"
            ).value = decodedText;

            validateVenueQR(
                decodedText
            );
        },

        (errorMessage) => {

            // ignore scan errors

        }

    );

})

.catch(err => {

    console.error(err);

    alert(
        "Camera access failed"
    );

});


}





        

// =====================================================
// VALIDATE VENUE QR
// =====================================================

function validateVenueQR(
    scannedVenueSecret
) {

alert(
    "SCANNED QR = " +
    scannedVenueSecret
);

    
    const statusDiv =
        document.getElementById(
            "status"
        );




// =====================================================
// LOAD OFFICIAL VENUE CONFIG
// =====================================================

db.ref(
    'config/attendanceConfig/' +
    eventId
).once('value')

.then(configSnap => {

    const config =
        configSnap.val() || {};

    const officialVenueSecret =
        String(
            config.venue_secret || ""
        ).trim();


    alert(
    "OFFICIAL = " +
    officialVenueSecret
);


        
    // =====================================================
// EXTRACT VENUE SECRET FROM URL QR
// =====================================================

if (
    scannedVenueSecret.includes("venue=")
) {

    const match =
        scannedVenueSecret.match(
            /venue=([^&]+)/i
        );

    if (match) {

        scannedVenueSecret =
            decodeURIComponent(
                match[1]
            ).trim();

alert(
    "AFTER EXTRACTION = " +
    scannedVenueSecret
);
        
    }
}










    
    // =====================================================
    // INVALID QR
    // =====================================================

alert(
    "COMPARE:\n[" +
    scannedVenueSecret +
    "]\nvs\n[" +
    officialVenueSecret +
    "]"
);



    
    if (
        scannedVenueSecret !==
        officialVenueSecret
    )








        












    

    
    
    
    
    
    
    
    
    
    
    {

            Invalid Venue QR
        </div>

        <div class="small">
            Please scan official event QR
        </div>
        `;

        return;
    }

  

db.ref(

    'attendance_logs/' +
    eventId

).push({

    attendee_id:
        currentAttendeeId,

    attendee_name:
        currentAttendee.full_name || "",

    attendee_type:
        currentAttendeeType,

    attendance_mode:
        "COMMON_QR",

    marked_at:
        new Date().toISOString()
});
        
   
    statusDiv.innerHTML =

`
<div class="success">
    Venue Verified
</div>

<div class="small">
    Attendance Marked Successfully
</div>
`;

})
.catch(err => {

    `;
});
