<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MERS Accommodation Status V1</title>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0}.card{max-width:700px;margin:20px auto;background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.15)}.pad{padding:20px}table{width:100%;border-collapse:collapse}td{padding:8px;border-bottom:1px solid #eee}.label{font-weight:bold;width:40%}.box{margin-top:15px;padding:12px;background:#f7f7f7;border-radius:8px}.value{font-size:20px;color:#1565c0;font-weight:bold}.center{text-align:center}
</style></head>
<body>
<div class="card"><div class="pad">
<h2 id="eventName" class="center">Event Name</h2>
<div id="venue" class="center">Venue</div>
<h2 class="center">🏨 Accommodation Status</h2>
<table>
<tr><td class="label">Participant</td><td id="participant"></td></tr>
<tr><td class="label">Registration ID</td><td id="regId"></td></tr>
</table>
<div class="box"><b>Accommodation Status (At the Time of Registration)</b><div id="original" class="value"></div></div>
<div class="box"><b>Current Accommodation Status</b><div id="current" class="value"></div></div>
<div class="center" style="margin-top:20px">Last Updated<br><span id="updated"></span></div>
</div></div>

<script type="module">
// Paste the Firebase initialization from your working index.html.
// URL format:
// accommodation_status.html?event=EVT001&id=EVT001-REG-...
//
// Read:
// config/eventConfig/{event}
// registrations/{event}/{id}
//
// Map:
// event.email_label -> eventName
// event.subtitle -> venue
// participant.full_name -> participant
// participant.registration_id -> regId
// participant.original_stay_allocation_code -> original
// participant.stay_allocation_code -> current
// participant.status_last_updated || participant.registration_timestamp -> updated
</script>
</body></html>
