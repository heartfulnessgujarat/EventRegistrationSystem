<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cancel Registration</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; text-align: center; }
    .header-img { width: 100%; height: 160px; object-fit: cover; background: #e0e0e0; display: block; }
    .header-content { padding: 15px; border-bottom: 1px solid #eee; }
    .header-content h2 { color: #1a237e; margin: 0; font-size: 18px; line-height: 1.3; }
    .header-content p { color: #666; font-size: 12px; margin: 5px 0 0; }
    .content-body { padding: 25px; }
    .info-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; border-left: 5px solid #1a237e; font-size: 13px; line-height: 1.6; }
    .question { font-weight: bold; color: #d32f2f; margin-bottom: 20px; font-size: 15px; }
    .btn-row { display: flex; gap: 10px; justify-content: center; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.3s; }
    .btn-yes { background: #d32f2f; color: white; }
    .btn-no { background: #4caf50; color: white; }
    .full-msg { padding: 40px 20px; }
    .icon { font-size: 50px; margin-bottom: 15px; }
    .timer-text { font-size: 12px; color: #999; margin-top: 20px; font-weight: bold; }
    #loader { color: #1a237e; font-weight: bold; padding: 40px; }
  </style>
</head>
<body>

<div class="card" id="main-card">
  <div id="loader">Fetching Details...</div>

  <!-- MAIN CONFIRMATION UI -->
  <div id="confirm-ui" style="display:none;">
    <img id="event-img" class="header-img" src="" alt="Event Banner">
    <div class="header-content">
      <h2 id="event-title">Loading...</h2>
      <p id="event-subtitle">Loading...</p>
    </div>
    <div class="content-body">
      <div class="info-box" id="user-info"></div>
      <p class="question">Are you sure, you want to delete this reg?</p>
      <div class="btn-row">
        <button class="btn btn-yes" onclick="handleResponse('YES')">Yes</button>
        <button class="btn btn-no" onclick="handleResponse('NO')">No</button>
      </div>
    </div>
  </div>

  <!-- STATUS MESSAGE SCREEN -->
  <div id="status-ui" class="full-msg" style="display:none;">
    <div class="icon" id="status-icon"></div>
    <h2 id="status-title"></h2>
    <p id="status-desc"></p>
    <p class="timer-text">This window will close in <span id="countdown">15</span> seconds.</p>
  </div>
</div>

<script>
  const firebaseConfig = { databaseURL: "https://ferrari-reg-2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const urlParams = new URLSearchParams(window.location.search);
  const eventId = urlParams.get('id') || "EVT001";
  const regId = urlParams.get('regId');

  window.onload = async () => {
    if (!regId) {
      showFinalStatus("Error", "Invalid link.", "⚠️");
      return;
    }

    try {
      // 1. Fetch Event Metadata from config/eventConfig/[eventId]
      const eventSnap = await db.ref(`config/eventConfig/${eventId}`).once('value');
      const eventConfig = eventSnap.val() || {};
      
      document.getElementById('event-title').innerText = eventConfig.title || "Event Registration";
      document.getElementById('event-subtitle').innerHTML = eventConfig.subtitle || "Registration Management";
      // Use the specific key from your screenshot: event_title_image_url
      document.getElementById('event-img').src = eventConfig.event_title_image_url || "";

      // 2. Search in Active Database
      const activeSnap = await db.ref(`registrations/${eventId}/${regId}`).once('value');
      const activeData = activeSnap.val();

      if (activeData) {
        showConfirmationUI(activeData);
      } else {
        // 3. Search in Deleted Database
        const deletedSnap = await db.ref(`deleted_registrations/${eventId}/${regId}`).once('value');
        const deletedData = deletedSnap.val();

        if (deletedData) {
          showFinalStatus("Already Cancelled", 
            `You have already deleted your reg on ${deletedData.cancelled_at}.`, "ℹ️");
        } else {
          showFinalStatus("Not Found", "We couldn't find this record.", "❓");
        }
      }
    } catch (e) {
      showFinalStatus("Error", "Connection error.", "❌");
    }
  };

  function showConfirmationUI(data) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('confirm-ui').style.display = 'block';
    document.getElementById('user-info').innerHTML = `
      <strong>Name:</strong> ${data.full_name}<br>
      <strong>Reg ID:</strong> ${regId}<br>
      <strong>Reg Date:</strong> ${data.timestamp || 'N/A'}<br>
      <strong>Status:</strong> ${data.registration_status || 'ACTIVE'}
    `;
  }

  async function handleResponse(choice) {
    document.getElementById('confirm-ui').style.display = 'none';
    document.getElementById('loader').innerText = "Processing...";
    document.getElementById('loader').style.display = 'block';

    if (choice === 'NO') {
      showFinalStatus("Stay with us!", "Thank you for staying with us...", "😊");
      return;
    }

    try {
      const snapshot = await db.ref(`registrations/${eventId}/${regId}`).once('value');
      const data = snapshot.val();
      
      data.registration_status = "CANCELLED";
      data.cancelled_at = new Date().toLocaleString();

      await db.ref(`deleted_registrations/${eventId}/${regId}`).set(data);
      await db.ref(`registrations/${eventId}/${regId}`).remove();

      await db.ref('counters/' + eventId).transaction(c => (c || 1) - 1);

      showFinalStatus("Cancelled", "Thank you for cancellation... your seat is released now for others...", "✅");
    } catch (e) {
      showFinalStatus("Error", "Process failed.", "❌");
    }
  }

  function showFinalStatus(title, desc, icon) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('confirm-ui').style.display = 'none';
    document.getElementById('status-ui').style.display = 'block';
    
    document.getElementById('status-title').innerText = title;
    document.getElementById('status-desc').innerText = desc;
    document.getElementById('status-icon').innerText = icon;

    startCountdown();
  }

  function startCountdown() {
    let timeLeft = 15;
    const timerElement = document.getElementById('countdown');
    const interval = setInterval(() => {
      timeLeft--;
      timerElement.innerText = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(interval);
        window.close();
      }
    }, 1000);
  }
</script>
</body>
</html>
