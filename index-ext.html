function formatFirebaseDate(fbDate) {
    if (!fbDate) return "";
    try {
        // This handles "1-Mar-2026" by splitting at the dashes
        const parts = fbDate.split('-');
        if (parts.length !== 3) return "";
        
        const day = parts[0].padStart(2, '0');
        const monthStr = parts[1];
        const year = parts[2];
        
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const monthIndex = months.indexOf(monthStr);
        if (monthIndex === -1) return "";
        
        const month = String(monthIndex + 1).padStart(2, '0');
        return `${year}-${month}-${day}`;
    } catch (e) {
        console.error("Date Translation Error:", e);
        return "";
    }
}

        type = "room";

    if (
        value.includes("dorm") ||
        value.includes("dormitory")
    ) {
        type = "dorm";

    // =====================================================

    const isWaitlist =
        value.includes("waiting");

    // =====================================================
    // RETURN
    // =====================================================

    return {
        type,
        isWaitlist
    };
}

/** --- START: GATEKEEPER HELPER FUNCTIONS --- **/
function getISTDate() {
  const now = new Date();
  const istOffset = 5.5 * 60 * 60 * 1000;
  const istTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + istOffset);
  istTime.setHours(0, 0, 0, 0); 
  return istTime;
}

function parseCustomDate(dateStr) {
  if (!dateStr || typeof dateStr !== 'string' || dateStr.trim() === "") return null;
  const months = {
    "Jan": 0, "Feb": 1, "Mar": 2, "Apr": 3, "May": 4, "Jun": 5,
    "Jul": 6, "Aug": 7, "Sep": 8, "Oct": 9, "Nov": 10, "Dec": 11
  };
  const parts = dateStr.split('-');
  if (parts.length !== 3) return null;
  const day = parseInt(parts[0], 10);
  const month = months[parts[1]];
  const year = parseInt(parts[2], 10);
  if (isNaN(day) || month === undefined || isNaN(year)) return null;
  return new Date(year, month, day);
}

  async function init() {

console.log("%c MERS PING 1: Init sequence started. CurrentSection is: " + (typeof currentSection !== 'undefined' ? currentSection : 'UNDEFINED'), "color: orange;");

    
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const mode = (urlParams.get('mode') || 'new').toLowerCase();
        const regId = urlParams.get('regId');

        // 1. Fetch Config from Firebase
        const configSnap = await db.ref('config/eventConfig').once('value');
        const allConfigs = configSnap.val() || {};
        eventConfig = allConfigs[eventId];
        
        if (!eventConfig) {
            document.getElementById('loading-init').innerHTML = "<h2>Event Not Found</h2>";
            return;
        }

        // 2. DATE CHECK (Gatekeeper Tier 1)
        const today = getISTDate();
        const startDate = parseCustomDate(eventConfig.reg_start_date);
        const endDate = parseCustomDate(eventConfig.reg_end_date);

        if (startDate && endDate) {
            if (today < startDate || today > endDate) {
                blockUIWithNotice(eventConfig.reg_close_msg || "Registration is currently closed.");
                return; 
            }
        }

// 3. CAPACITY CHECK (Gatekeeper Tier 2 - Now using Active Seats)
        if (mode === 'new') {
            // We now point to 'active_seats' instead of 'counters' 
            // to allow people to fill seats released by cancellations.
            const seatSnap = await db.ref('active_seats/' + eventId).once('value');
            const currentOccupancy = Number(seatSnap.val() || 0); 
            const maxCapacity = Number(eventConfig.hall_capacity || 0);

            console.log(`[CAPACITY CHECK] Occupancy: ${currentOccupancy} / Max: ${maxCapacity}`);

            if (maxCapacity > 0 && currentOccupancy >= maxCapacity) {
                blockUIWithNotice(eventConfig.hall_capacity_full_msg || "Hall Capacity is full.");
                return; 
            }
        }



      
        // 4. LOAD UI COMPONENTS
        const [thankSnap, bannerSnap] = await Promise.all([
            db.ref('htmlStorage/' + eventId + '/thank').once('value'),
            db.ref('htmlStorage/' + eventId + '/banner').once('value')
        ]);

        eventConfig.final_html = thankSnap.val() || "<h2>Registration Successful!</h2>";
        const bannerHtml = bannerSnap.val(); 

        document.getElementById('title').innerHTML = eventConfig.title || "Registration";

        const container = document.getElementById('header-img-cont');
        if (bannerHtml && container) {
            container.innerHTML = bannerHtml;
            container.style.display = 'block';
        } else if (container) {
            container.style.display = 'none';
        }
      
        document.getElementById('subtitle').innerHTML = eventConfig.subtitle || "";
        
        // --- MERS: DATA BRIDGE ---
        
        // 1. Load Field Rules (Filtering for this specific Event ID)
        try {
          
          const rulesSnap = await db.ref('config/extFieldRules').once('value');

          
            const allRules = rulesSnap.val() || {};
            fieldRules = Object.values(allRules).filter(r => String(r.event_id).toUpperCase() === eventId);
            console.log("MERS: Field Rules Loaded:", fieldRules.length);
        } catch (ruleErr) {
            console.error("MERS: Field Rules fetch error:", ruleErr);
            fieldRules = [];
        }

        // 2. Load More Sections (Correcting path to camelCase 'moreSections')
        try {
            const sectionsSnap = await db.ref('config/moreSections').once('value');
            if (sectionsSnap.exists()) {
                const allSections = sectionsSnap.val() || {};
                moreSections = Object.values(allSections);
                console.log("MERS: moreSections Loaded from Firebase:", moreSections.length);
            } else {
                console.warn("MERS: No data found at 'config/moreSections'.");
                moreSections = [];
            }
        } catch (secErr) {
            console.error("MERS: moreSections fetch error:", secErr);
            moreSections = [];
        }

        // --- END MERS DATA BRIDGE ---
        
        // --- ROUTING LOGIC ---
        if (mode === 'edit' || mode === 'delete') {
            if (regId) {
                loadExistingData(regId, mode); 
            } else {
                alert("Invalid Link: Registration ID missing.");
                location.href = window.location.pathname + "?id=" + eventId;
            }
        } else {
            // Normal New Registration
            renderForm();
            document.getElementById('loading-init').style.display = 'none';
            document.getElementById('form-content').style.display = 'block';
        }
        
    } catch (e) { 
        console.error("Initialization Error:", e);
        document.getElementById('loading-init').innerHTML = "<h2>Error loading form. Please refresh.</h2>";
    }

  //  if (section2) {
   //     section2.prepend(diag);
  //  }
    
}

  async function handleSearch(fId, val) {

  const resDiv = document.getElementById(`res-${fId}`);

  if (val.length < 3) {
    resDiv.style.display = 'none';
    return;
  }

  const rule =
    fieldRules.find(r => r.field_id === fId);

  const lookupTab =
    rule ? rule.lookup_tab : "Master_External_DB";

  // =====================================================
  // LOAD LOOKUP DATABASE
  // =====================================================

  if (
      lookupTab &&
      (
          masterData.length <= 1 ||
          fId === 'ext_city'
      )
  ) {

      const snap =
        await db.ref(
          'masters/' + lookupTab
        ).once('value');

      const raw = snap.val() || {};

      masterData =
        Array.isArray(raw)
          ? raw
          : Object.values(raw);
  }

  const searchVal = val.toLowerCase();

  // =====================================================
  // EXTERNAL CITY SEARCH
  // =====================================================

  if (
      fId === 'ext_city'
  ) {

      const matchedObjects =
        masterData.filter(x => {

          const c =
            x.centre ||
            x.ext_city ||
            x['Centre'] ||
            "";

          return String(c)
            .toLowerCase()
            .includes(searchVal);

      });

      // UNIQUE CITY LIST
      const uniqueMap = new Map();

      matchedObjects.forEach(item => {

          const cityName =
            String(
                item.centre ||
                item.ext_city ||
                item['Centre'] ||
                ""
            ).trim();

          if (
              cityName &&
              !uniqueMap.has(
                  cityName.toLowerCase()
              )
          ) {

              uniqueMap.set(
                  cityName.toLowerCase(),
                  item
              );
          }
      });

      const finalUniqueList =
        Array.from(uniqueMap.values());

      renderDropdown(
          resDiv,
          finalUniqueList.slice(0, 8),
          'loc'
      );
  }
}

  async function updateLiveRegDataProjection(
    formData,
    eventIdParam

            "MERS LIVE REG: Projection update started..."

            return;

            configSnap.val();

    const teamConfigs =
        allConfigs[eventKey] || {};

            // Skip inactive rows

            // ============================================

            let selectedColumns = [];

                );

                continue;
            }

            const filteredData = {};


          selectedColumns.forEach(col => {

        let value =
    formData[col] ??
    formData[normalizedKey];

// =====================================================

if (

) {

        value =

    }
}

filteredData[col] =
    value || "";


            

            

});

       
            // Always preserve registration_id

console.log(
 "MERS LIVE REG: Updated:",
 projectionPath

}

function manualFormatCheck() {

  const emailInput =
    document.getElementById('inp-ext_email') ||
    document.getElementById('inp-email');

  const emailVal =
    emailInput.value.trim();

  const vBtn =
    document.getElementById('vbtn-ext_email') ||
    document.getElementById('vbtn-email');

  const checkBtn =
    document.getElementById('vcheck-ext_email') ||
    document.getElementById('vcheck-email');

  const msg =
    document.getElementById('vmsg-ext_email') ||
    document.getElementById('vmsg-email');

  const strictRegex =
    /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,6}$/;

  if (strictRegex.test(emailVal)) {

      if (checkBtn) {
          checkBtn.style.display = 'none';
      }

      if (vBtn) {

          vBtn.style.display = 'block';

          vBtn.innerText =
            `Format accepted, click here to send verification code to ${emailVal}`;
      }

      emailInput.style.border =
        '1px solid #ced4da';

      if (msg) {

          msg.innerText =
            "Format Accepted ✅";

          msg.style.color =
            "#2e7d32";

          msg.style.display =
            "block";
      }

  } else {

      let errorNote =
        "Please check for typos or extra characters.";

      if (!emailVal.includes("@")) {

          errorNote =
            "Missing '@' symbol.";
      }

      else if (!emailVal.includes(".")) {

          errorNote =
            "Missing a dot (e.g., .com).";
      }

      else if (/\s/.test(emailVal)) {

          errorNote =
            "Spaces are not allowed within the email.";
      }

      alert(
        "❌ FORMAT ISSUE\n\n" +
        errorNote
      );

      if (vBtn) {
          vBtn.style.display = 'none';
      }

      emailInput.style.border =
        '2px solid red';

      emailInput.focus();
  }
}

  function translateToISO(val) {
    if (!val) return "";
    const str = String(val).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
    if (str.includes('-')) {
        const parts = str.split('-');
        if (parts.length === 3) {
            const day = parts[0].padStart(2, '0');
            const monthStr = parts[1].toLowerCase().substring(0, 3);
            const year = parts[2].length === 2 ? "20" + parts[2] : parts[2];
            const monthsMap = {
                jan: '01', feb: '02', mar: '03', apr: '04', may: '05', jun: '06',
                jul: '07', aug: '08', sep: '09', oct: '10', nov: '11', dec: '12'
            };
            const month = monthsMap[monthStr] || parts[1].padStart(2, '0');
            return year + "-" + month + "-" + day;
        }
    }
    if (str.includes(':')) {
        const tParts = str.split(':');
        return tParts[0].padStart(2, '0') + ":" + tParts[1].padStart(2, '0');
    }
    return str;
}

function validateField(id, value, rule) {
    const val = value ? value.trim() : "";
    const rulesArray = Array.isArray(fieldRules) ? fieldRules : Object.values(fieldRules);
    const ruleObj = rulesArray.find(r => r.field_id === id);
    const errorMsg = ruleObj ? ruleObj.error_msg : "Invalid Entry";

    if (!rule || rule === 'NULL' || val === "") {
        return val !== "";
    }


  if (rule === 'MOB') {

    return /^[6-9]\d{9}$/.test(val);
}

if (rule === 'PIN') {

    return /^\d{6}$/.test(val);
}

if (rule === 'EMAIL') {

    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
}




  

    // --- ARRIVAL DATE (ESD) - UNTOUCHED ---
    if (rule.includes("ESD")) {
        const isoInput = translateToISO(val);
        const isoConfig = translateToISO(eventConfig.event_start_date);
        if (isoInput && isoConfig && isoInput > isoConfig) {

          
         //   alert("❌ " + errorMsg);
          showValidationPopup(errorMsg, "date");
          
            let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
            if (targetBox) targetBox.value = "";
            updateButtonState();
            return false;
        }
    }



// --- SMART ARRIVAL TIME (T SHOULD BE <EST) ---
    if (rule.includes("T SHOULD BE <EST")) {
        const dateEl = document.getElementById('arrival_date') || document.getElementById('extra_arrival_date');
        const userArrivalDate = dateEl ? dateEl.value : "";

        // Normalize Dates to ISO (YYYY-MM-DD) for accurate comparison
        const userDateISO = translateToISO(userArrivalDate);
        const eventDateISO = translateToISO(eventConfig.event_start_date);

        // SCENARIO B: If Arrival Date is earlier than Event Start Date, it is ALWAYS VALID.
        if (userDateISO < eventDateISO) {
            return true; 
        }

        // SCENARIO A: If Arrival Date is the SAME as Event Start Date, check the Time.
        if (userDateISO === eventDateISO) {
            const isoInputTime = translateToISO(val); // User entered time
            const isoConfigTime = translateToISO(eventConfig.event_start_time); // Config start time

            // Trigger error only if Arrival Time is NOT earlier than Start Time
            if (isoInputTime >= isoConfigTime) {
              
              //  alert("❌ " + errorMsg);

              showValidationPopup(errorMsg, "time");
              
                let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
                if (targetBox) targetBox.value = "";
                updateButtonState();
                return false;
            }
        }
    }

      
    // --- DEPARTURE DATE (EED) - UNTOUCHED ---
    if (rule.includes("EED")) {
        const isoInput = translateToISO(val);
        const isoConfig = translateToISO(eventConfig.event_end_date);
        if (isoInput && isoConfig && isoInput < isoConfig) {
          
         //   alert("❌ " + errorMsg);
          showValidationPopup(errorMsg, "date");
          
            let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
            if (targetBox) targetBox.value = "";
            updateButtonState();
            return false;
        }
    }
// --- SMART DEPARTURE TIME (T SHOULD BE >EET) ---
    if (rule.includes("T SHOULD BE >EET")) {
        const dateEl = document.getElementById('depart_date') || document.getElementById('extra_depart_date');
        const userDepartDate = dateEl ? dateEl.value : "";

        // Normalize Dates for comparison
        const userDateISO = translateToISO(userDepartDate);
        const eventEndDateISO = translateToISO(eventConfig.event_end_date);

        // SCENARIO B: If Departure Date is LATER than Event End Date, it is ALWAYS VALID.
        if (userDateISO > eventEndDateISO) {
            return true;
        }

        // SCENARIO A: If Departure Date is the SAME as Event End Date, check the Time.
        if (userDateISO === eventEndDateISO) {
            const isoInputTime = translateToISO(val); // User entered departure time
            const isoConfigTime = translateToISO(eventConfig.event_end_time); // Config end time

            // Trigger error if Departure Time is NOT later than Event End Time
            // (i.e., if they try to leave before or exactly at the end time)
            if (isoInputTime <= isoConfigTime) {
              
             //   alert("❌ " + errorMsg);
              
              showValidationPopup(errorMsg, "time");
              
                let targetBox = document.getElementById(id) || document.getElementById('extra_' + id); 
                if (targetBox) targetBox.value = "";
                updateButtonState();
                return false;
            }
        }
    }

 
    return true;
}

/**
 * NEW: MERS Live Availability Engine (Rooms + Dorms - Gender Aware)
 */



async function getStayAvailability(eventId, gender) {

  const db = firebase.database();

  // ✅ USE EXISTING GLOBAL CONFIG
  const config = eventConfig;

  if (!config) {
    throw new Error("Event config not loaded");
  }

  // =====================================================
  // NORMALIZE GENDER SAFELY
  // =====================================================

  const normalizedGender =
    (gender || "")
      .trim()
      .toLowerCase();

  // =====================================================
  // CONFIG
  // =====================================================

  const roomCapacity =
    Number(config.room_capacity) || 0;

  const personsPerRoom =
    Number(config.persons_per_room) || 2;

  const maleDormCap =
    Number(config.male_dorm_capacity) || 0;

  const femaleDormCap =
    Number(config.female_dorm_capacity) || 0;

  const maleDormSize =
    Number(config.male_dorm_persons_per_dorm) || 0;

  const femaleDormSize =
    Number(config.female_dorm_persons_per_dorm) || 0;

  // =====================================================
  // FETCH CONFIRMED COUNTERS
  // =====================================================

  const [
    maleRoomSnap,
    femaleRoomSnap,
    maleDormSnap,
    femaleDormSnap
  ] = await Promise.all([

    db.ref(
      'counters/confirmed_counters/room_male/' +
      eventId
    ).once('value'),

    db.ref(
      'counters/confirmed_counters/room_female/' +
      eventId
    ).once('value'),

    db.ref(
      'counters/confirmed_counters/dorm_male/' +
      eventId
    ).once('value'),

    db.ref(
      'counters/confirmed_counters/dorm_female/' +
      eventId
    ).once('value')

  ]);

  const maleRoom =
    maleRoomSnap.val() || 0;

  const femaleRoom =
    femaleRoomSnap.val() || 0;

  const maleDorm =
    maleDormSnap.val() || 0;

  const femaleDorm =
    femaleDormSnap.val() || 0;

  // =====================================================
  // DORM CALCULATION
  // =====================================================

  const maleDormTotal =
    maleDormCap * maleDormSize;

  const femaleDormTotal =
    femaleDormCap * femaleDormSize;

  const dormSeats =
    normalizedGender === "male"

      ? Math.max(0, maleDormTotal - maleDorm)

      : Math.max(0, femaleDormTotal - femaleDorm);

  // =====================================================
  // ROOM CALCULATION
  // =====================================================

  let roomSeats = 0;

  if (normalizedGender === "male") {

    // Female occupied rooms block male usage
    const femaleRoomsOccupied =
      Math.ceil(
        femaleRoom / personsPerRoom
      );

    // Remaining rooms usable for males
    const roomsAvailableForMale =
      Math.max(
        0,
        roomCapacity - femaleRoomsOccupied
      );

    // Maximum seats males can use
    const maxMaleSeats =
      roomsAvailableForMale *
      personsPerRoom;

    // Remaining usable male seats
    roomSeats =
      maxMaleSeats - maleRoom;

  } else {

    // Male occupied rooms block female usage
    const maleRoomsOccupied =
      Math.ceil(
        maleRoom / personsPerRoom
      );

    // Remaining rooms usable for females
    const roomsAvailableForFemale =
      Math.max(
        0,
        roomCapacity - maleRoomsOccupied
      );

    // Maximum seats females can use
    const maxFemaleSeats =
      roomsAvailableForFemale *
      personsPerRoom;

    // Remaining usable female seats
    roomSeats =
      maxFemaleSeats - femaleRoom;
  }

  // =====================================================
  // SAFETY
  // =====================================================

  roomSeats =
    Math.max(0, roomSeats);

  // =====================================================
  // WAITLIST COUNTERS
  // =====================================================

  let roomWaitlist = 0;
  let dormWaitlist = 0;

  // ===== ROOM WL =====

  if (normalizedGender === 'male') {

    const roomWLSnap =
      await db.ref(
        'counters/waitlist_counters/room_male/' +
        eventId
      ).once('value');

    roomWaitlist =
      roomWLSnap.val() || 0;

  } else {

    const roomWLSnap =
      await db.ref(
        'counters/waitlist_counters/room_female/' +
        eventId
      ).once('value');

    roomWaitlist =
      roomWLSnap.val() || 0;
  }

  // ===== DORM WL =====

  if (normalizedGender === 'male') {

    const dormWLSnap =
      await db.ref(
        'counters/waitlist_counters/dorm_male/' +
        eventId
      ).once('value');

    dormWaitlist =
      dormWLSnap.val() || 0;

  } else {

    const dormWLSnap =
      await db.ref(
        'counters/waitlist_counters/dorm_female/' +
        eventId
      ).once('value');

    dormWaitlist =
      dormWLSnap.val() || 0;
  }

  // =====================================================
  // RETURN
  // =====================================================

  return {
    roomSeats,
    dormSeats,
    roomWaitlist,
    dormWaitlist
  };
}

  function filterStayChoices(choices) {

    if (!window.availability) {
        return choices;
    }

    const roomSeats =
        window.availability.roomSeats || 0;

    const dormSeats =
        window.availability.dormSeats || 0;

    return choices.filter(choice => {

        const c = choice.toLowerCase();

        // Always keep outside stay
        if (c.includes('outside')) {
            return true;
        }

        // ROOM logic
        if (c.includes('room')) {

            if (
                roomSeats > 0 &&
                !c.includes('waiting')
            ) {
                return true;
            }

            if (
                roomSeats === 0 &&
                c.includes('waiting')
            ) {
                return true;
            }

            return false;
        }

        // DORM logic
        if (c.includes('dorm')) {

            if (
                dormSeats > 0 &&
                !c.includes('waiting')
            ) {
                return true;
            }

            if (
                dormSeats === 0 &&
                c.includes('waiting')
            ) {
                return true;
            }

            return false;
        }

        return true;
    });
}


function filterRoomChoices(fieldId, choices) {

    if (
        !window.availability ||
        !fieldId.toLowerCase().includes('room')
    ) {
        return choices;
    }

    return choices.filter(choice => {

        const choiceLower =
            choice.toLowerCase();

        // Hide Room options
        if (
            window.availability.room === false &&
            choiceLower.includes('room')
        ) {
            return false;
        }

        // Hide Waiting options
        if (
            window.availability.waiting === false &&
            choiceLower.includes('waiting')
        ) {
            return false;
        }

        return true;
    });
}



function getSectionIndex(sectionNumber) {

    return moreSections.findIndex(
        s => s.section_number === sectionNumber
    );
}

function getNextSection(currentSection) {

    const currentIndex =
        getSectionIndex(currentSection);

    if (currentIndex === -1) {
        return null;
    }

    const nextSection =
        moreSections[currentIndex + 1];

    return nextSection
        ? nextSection.section_number
        : null;
}

function getPreviousSection(currentSection) {

    const currentIndex =
        getSectionIndex(currentSection);

    if (currentIndex <= 0) {
        return null;
    }

    const previousSection =
        moreSections[currentIndex - 1];

    return previousSection
        ? previousSection.section_number
        : null;
}
